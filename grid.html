     .status-badge-completed {

     /* (NEW - FIX) เพิ่ม CSS สำหรับป้ายตอนล่าสุดที่หายไป */
     .status-badge-episode {
        position: absolute;

    /* (NEW) Pagination Button Styles */

            background-color: transparent;

<body class="bg-black text-gray-100">

    <!-- Firebase SDK and Application Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, onSnapshot, collection, query, setLogLevel,
            limit, orderBy, where, startAfter, getDocs 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // (*** จำลอง Firebase Config ***)
        const firebaseConfig = {
            apiKey: "AIzaSyDVXZUnw5oiTLqCG00GYdtPTwzOubCSe1o",
            authDomain: "ani-end-94710.firebaseapp.com",
            projectId: "ani-end-94710",
            storageBucket: "ani-end-94710.firebasestorage.app",
            messagingSenderId: "374608108501",
            appId: "1:374608108501:web:19a4767c41a020bfb03b5c",
            measurementId: "G-VZM1XTPMYL"
        };
        
        const appId = firebaseConfig.projectId;

        // Constants for Pagination
        const ITEMS_PER_PAGE = 28; // 7 columns * 4 rows
        
        let db, auth, userId;
        let allShows = []; 
        let allTags = new Set(); 
        let historyItems = []; 
        
        let isDataLoaded = false; 
        
        // State for Grid View Pagination
        let currentGridTag = null; 
        let gridFilteredShows = []; 
        let currentGridPage = 1; 
        let totalGridPages = 1; 

        // UI Elements
        let gridViewContainer;
        let gridViewTitle;
        let gridViewContent;
        let paginationContainer; 
        let searchInput;
        let searchDropdown;
        let mobileSearchInput;
        let mobileSearchDropdown;
        let desktopNavLinks;
        let mobileNavLinks;
        
        let initialQueryFromUrl = null;
        let currentSearchQuery = null; 

        // (NEW FLAG) For History API stability
        let isUrlSet = false;

        // Thai Normalization (KEEP)
        function normalizeThai(text) {
            if (typeof text !== 'string') return text;
            let normalized = text.normalize('NFC'); 
            normalized = normalized.replace(/\u0E4D\u0E32/g, '\u0E33');
            return normalized; 
        }
        
        async function initializeFirebase() {
            try {
                const app = initializeApp(firebaseConfig); 
                db = getFirestore(app);
                auth = getAuth(app);
                setLogLevel('Debug'); 

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        userId = user.uid;
                        console.log("User Authenticated (Anonymous):", userId);
                        await setupListeners();
                        setupHistoryListener();
                    } else {
                        console.log("No user signed in. Attempting sign in...");
                        await signInAnonymously(auth);
                    }
                });

            } catch (error) {
                console.error("Firebase Initialization Error:", error);
                gridViewContent.innerHTML = `<p class="text-center w-full col-span-full text-red-500">ไม่สามารถเชื่อมต่อ Firebase ได้</p>`;
            }
        }

        function getCollectionRef(collectionName) {
            return collection(db, `artifacts/${appId}/public/data/${collectionName}`);
        }
        
        function getHistoryCollectionRef() {
             return collection(db, `artifacts/${appId}/users/${userId}/viewHistory`);
        }

        async function setupListeners() {
            // 1. Listener for Shows
            const showsQuery = query(getCollectionRef("shows"));
            onSnapshot(showsQuery, (snapshot) => {
                allShows = [];
                allTags.clear();
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    allShows.push({ id: doc.id, ...data });
                    (data.tags || []).forEach(tag => allTags.add(tag));
                });
                
                console.log("Shows loaded:", allShows.length);
                
                const wasDataLoaded = isDataLoaded;
                isDataLoaded = true; 
                
                // (MODIFIED) Check initial load/URL parameters
                if (!wasDataLoaded) {
                    checkInitialLoad();
                } else if (currentSearchQuery) {
                    // If data updates while on search, re-run search
                    performSearch(currentSearchQuery);
                } else if (currentGridTag) {
                    // If data updates while on tag view, re-initialize
                    initializeGridPaging(currentGridTag, currentGridPage); // Pass current page to re-render
                }
                
                // (REMOVED) renderDynamicNav call moved to DOMContentLoaded and checkInitialLoad
                
            }, (error) => {
                console.error("Error listening to shows:", error);
                gridViewContent.innerHTML = `<p class="text-center w-full col-span-full text-red-500">ไม่สามารถโหลดข้อมูลอนิเมะได้</p>`;
            });
            
            // 3. Listener for View History (Needed for correct card linking)
            setupHistoryListener();
        }
        
        function setupHistoryListener() {
            if (!userId) return;
            const historyQuery = query(getHistoryCollectionRef(), orderBy("watchedAt", "desc"), limit(50));
            onSnapshot(historyQuery, (snapshot) => {
                historyItems = [];
                snapshot.forEach((doc) => {
                    historyItems.push({ id: doc.id, ...doc.data() });
                });
                console.log("Latest history items loaded:", historyItems.length);
                
                // Re-render the current view to update card links
                if (currentSearchQuery) {
                    performSearch(currentSearchQuery);
                } else if (currentGridTag) {
                    renderPage(currentGridPage); 
                }
            }, (error) => {
                console.error("Error listening to view history:", error);
            });
        }
        
        // (MODIFIED) Check URL parameters on initial load
        let initialLoadDone = false; // Flag to track if initial load logic completed
        function checkInitialLoad() {
            const urlParams = new URLSearchParams(window.location.search);
            const tagFromUrl = urlParams.get('tag');
            const searchFromUrl = urlParams.get('search'); 
            // (NEW) Read page number from URL on initial load
            const pageFromUrl = parseInt(urlParams.get('page')) || 1; 

            if (searchFromUrl) {
                const query = decodeURIComponent(searchFromUrl);
                currentSearchQuery = query;
                performSearch(query);
                renderDynamicNav('search-results'); // (FIX) Call renderDynamicNav *after* setting context
            } else if (tagFromUrl) {
                currentGridTag = decodeURIComponent(tagFromUrl);
                initializeGridPaging(currentGridTag, pageFromUrl); // Pass pageFromUrl
                renderDynamicNav(currentGridTag); // (FIX) Call renderDynamicNav *after* setting context
            } else {
                 // No tag or search specified, default to 'อนิเมะ' 
                 currentGridTag = 'อนิเมะ';
                 initializeGridPaging(currentGridTag, pageFromUrl); // Pass pageFromUrl
                 renderDynamicNav(currentGridTag); // (FIX) Call renderDynamicNav *after* setting context
            }
            initialLoadDone = true;
        }

        // --- Navigation Rendering (Adjusted for grid.html) ---
        function renderDynamicNav(activePageId) {
            if (!desktopNavLinks || !mobileNavLinks) return;
            
            // 1. Reset all links to inactive state first (if they exist)
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active', 'text-green-500');
                link.classList.add('text-gray-300', 'hover:text-white', 'hover:bg-gray-700');
            });

            // 2. Determine which link to set as active (based on currentGridTag or 'home')
            let targetPageId = activePageId;
            if (activePageId === 'search-results') {
                // If it's a search result, don't activate any tag link, default to 'home' visually
                targetPageId = 'home';
            }
            
            // 3. Set the active link(s)
            document.querySelectorAll(`.nav-link[data-page="${targetPageId}"]`).forEach(link => {
                link.classList.add('active', 'text-green-500');
                link.classList.remove('text-gray-300', 'hover:text-white', 'hover:bg-gray-700');
            });
        }
        
        // (KEEP) Card Rendering Logic
        function createContentCard(show, rankNumber = null, history = null) {
            const watchedEpisodeId = history ? history.lastWatchedEpisodeId : null;
            let targetUrl = `player.html?id=${show.id}`;
            
            if (watchedEpisodeId) {
                targetUrl = `player.html?id=${show.id}&ep_id=${watchedEpisodeId}`;
            }

            const isThaiDub = (show.tags || []).includes('อนิเมะพากย์ไทย');
            const dubBadge = isThaiDub ? `
                <div class="dub-badge">
                    <i class="ri-volume-up-line"></i> พากย์ไทย
                </div>` : '';
                
            const isCompleted = show.isCompleted === true;
            const completedBadge = isCompleted ? `
                <div class="status-badge-completed">จบแล้ว</div>
            ` : '';
            
            let episodeBadge = '';
            const latestEpisode = show.latestEpisodeNumber || 0;
            
            if (latestEpisode > 0) {
                episodeBadge = `
                    <div class="status-badge-episode">ตอนที่ ${latestEpisode}</div>
                `;
            }

            return `
                <a href="${targetUrl}" class="block group bg-gray-800 rounded-lg overflow-hidden shadow-lg hover:shadow-xl transition-shadow duration-300">
                        <div class="aspect-[2/3] overflow-hidden relative">
                            ${dubBadge}
                            ${episodeBadge} 
                            <img src="${show.thumbnailUrl || 'https://placehold.co/400x600/333/fff?text=No+Img'}" 
                                 alt="${show.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                            ${completedBadge} 
                        </div>
                        <div class="text-white p-3 pt-2 h-14"> 
                            <h4 class="font-bold card-title text-base">${show.title}</h4> 
                        </div>
                    </a>
                `;
            }

        // (MODIFIED) Pagination Logic - Added initialPage
        function initializeGridPaging(tag, initialPage = 1) {
            currentGridTag = tag;
            gridViewTitle.textContent = tag;
            currentSearchQuery = null;
            
            gridFilteredShows = allShows
                .filter(s => (s.tags || []).includes(tag))
                .sort((a, b) => {
                    const timeA = a.updatedAt ? a.updatedAt.toMillis() : 0;
                    const timeB = b.updatedAt ? b.updatedAt.toMillis() : 0;
                    return timeB - timeA; 
                });

            totalGridPages = Math.ceil(gridFilteredShows.length / ITEMS_PER_PAGE);
            
            // (NEW) Set current page based on URL, ensuring it's valid
            currentGridPage = Math.max(1, Math.min(initialPage, totalGridPages));

            gridViewContent.innerHTML = '';
            paginationContainer.innerHTML = '';
            
            gridViewContent.innerHTML = `<p class="text-center w-full col-span-full text-gray-400">กำลังจัดเรียงและโหลดรายการ...</p>`;

            renderPage(currentGridPage);

            gridViewContent.className = 'grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-7 gap-4';
        }

        function renderPage(pageNumber) {
            if (pageNumber < 1 || pageNumber > totalGridPages) return;
            
            currentGridPage = pageNumber;
            gridViewContent.innerHTML = '';
            
            const startIndex = (pageNumber - 1) * ITEMS_PER_PAGE;
            const endIndex = Math.min(startIndex + ITEMS_PER_PAGE, gridFilteredShows.length);
            const showsToRender = gridFilteredShows.slice(startIndex, endIndex);

            if (showsToRender.length > 0) {
                showsToRender.forEach((show) => {
                    const historyItem = historyItems.find(h => h.showId === show.id);
                    gridViewContent.innerHTML += createContentCard(show, null, historyItem); 
                });
            } else if (pageNumber === 1 && currentGridTag) {
                gridViewContent.innerHTML = `<p class="text-center w-full col-span-full">ไม่พบอนิเมะสำหรับ "${currentGridTag}"</p>`;
            } else if (pageNumber === 1 && currentSearchQuery) {
                 gridViewContent.innerHTML = `<p class="text-center w-full col-span-full">ไม่พบผลลัพธ์สำหรับ "${currentSearchQuery}"</p>`;
            }
            
            // (FIX) Scroll to the title (h2) instead of the whole container
            // to prevent the title from being hidden under the sticky header.
            if (gridViewTitle) {
                 gridViewTitle.scrollIntoView({ behavior: 'smooth' });
            }
            
            // (NEW) Update URL using pushState
            updatePageUrl(pageNumber);

            renderPaginationControls();
        }
        
        // (FIXED AGAIN - Final Logic) Update URL function - Handle Blob/Initial load instability
        function updatePageUrl(pageNumber) {
            // (FIX) Add guard clause to prevent execution in Blob/iframe context
            if (!window.history.replaceState || window.location.protocol.startsWith('blob:')) {
                return; 
            }
            
            let contextQuery = '';

            // 1. Determine base parameter (tag or search) and ensure encoding
            if (currentSearchQuery) {
                contextQuery = `search=${encodeURIComponent(currentSearchQuery)}`;
            } else if (currentGridTag) {
                contextQuery = `tag=${encodeURIComponent(currentGridTag)}`;
            }
            
            // If no context is set, do not proceed.
            if (!contextQuery) return; 
            
            let pageQuery = '';
            // 2. Add page number if it's greater than 1
            if (pageNumber > 1) { 
                 pageQuery = `page=${pageNumber}`;
            }

            // Construct the full new query string
            const components = [contextQuery, pageQuery].filter(q => q);
            const newQueryString = components.join('&');
            
            const currentQueryString = window.location.search.substring(1);
            
            // 3. Construct the target URL
            const newRelativeUrl = `grid.html${newQueryString ? '?' + newQueryString : ''}`;
            
            // 4. Compare and push state
            
            // Get the current relative URL (filename + search)
            const currentFilename = window.location.pathname.split('/').pop();
            const currentRelativeUrl = (currentFilename.includes('grid.html') ? 'grid.html' : currentFilename) + window.location.search; 

            // Only update if the target URL is different from the current effective URL.
            if (newRelativeUrl !== currentRelativeUrl) {
                 window.history.replaceState({}, '', newRelativeUrl);
            }
        }
        
        function renderPaginationControls() {
            if (!paginationContainer) return;
            paginationContainer.innerHTML = '';
            
            if (totalGridPages <= 1) return; 

            const maxVisibleButtons = 7; 
            let buttonsHtml = '';

            buttonsHtml += createPageButton('«', currentGridPage - 1, 'nav', currentGridPage === 1);

            if (totalGridPages <= maxVisibleButtons) {
                for (let i = 1; i <= totalGridPages; i++) {
                    buttonsHtml += createPageButton(i, i, 'page', false, i === currentGridPage);
                }
            } else {
                let start = Math.max(1, currentGridPage - 2);
                let end = Math.min(totalGridPages, currentGridPage + 2);

                if (currentGridPage - 1 <= 2) {
                    end = Math.min(totalGridPages, maxVisibleButtons - 2);
                }
                if (totalGridPages - currentGridPage <= 2) {
                    start = Math.max(1, totalGridPages - maxVisibleButtons + 3);
                }

                if (start > 1) {
                    buttonsHtml += createPageButton(1, 1, 'page');
                }
                if (start > 2) {
                    buttonsHtml += createPageButton('...', -1, 'dots', true);
                }
                
                for (let i = start; i <= end; i++) {
                    buttonsHtml += createPageButton(i, i, 'page', false, i === currentGridPage);
                }
                
                if (end < totalGridPages - 1) {
                     buttonsHtml += createPageButton('...', -1, 'dots', true);
                }
                if (end < totalGridPages) {
                    buttonsHtml += createPageButton(totalGridPages, totalGridPages, 'page');
                }
            }

            buttonsHtml += createPageButton('»', currentGridPage + 1, 'nav', currentGridPage === totalGridPages);
            
            paginationContainer.innerHTML = buttonsHtml;
        }
        
        function createPageButton(text, page, type, isDisabled = false, isActive = false) {
             const activeClass = isActive ? 'active bg-green-600 !text-white' : '';
             const disabledAttr = isDisabled ? 'disabled' : '';
             const pageData = type === 'page' ? `data-page="${page}"` : '';
             const navData = type === 'nav' ? `data-page="${page}"` : '';
             
             if (type === 'dots') {
                return `<button class="pagination-btn dots" disabled>...</button>`;
             }
             
             // (MODIFIED) Added bg-gray-700/80 to ensure style consistency
             return `
                <button class="pagination-btn ${type} ${activeClass} ${type === 'page' ? 'bg-gray-700/80 hover:bg-gray-600' : ''}" ${pageData} ${navData} ${disabledAttr}>
                    ${text}
                </button>
             `;
        }

        // --- Search Logic (Adjusted to be primary content) ---
        function updateSearchDropdown(query, dropdownEl) {
            const normalizedQuery = normalizeThai(query).toLowerCase().trim();
            dropdownEl.innerHTML = '';
            
            if (normalizedQuery.length < 2) {
                dropdownEl.classList.add('hidden');
                return;
            }
            const results = allShows
                .filter(s => normalizeThai(s.title).toLowerCase().includes(normalizedQuery))
                .slice(0, 10); 
            if (results.length === 0) {
                dropdownEl.innerHTML = '<a class="block p-3 text-sm text-gray-400">ไม่พบผลลัพธ์</a>';
                dropdownEl.classList.remove('hidden');
                return;
            }
            results.forEach(show => {
                const item = document.createElement('a');
                const historyItem = historyItems.find(h => h.showId === show.id);
                const targetUrl = historyItem ? `player.html?id=${show.id}&ep_id=${historyItem.lastWatchedEpisodeId}` : `player.html?id=${show.id}`;
                item.href = targetUrl;
                
                item.className = 'search-dropdown-item block p-3 text-sm font-medium text-gray-200';
                
                const highlightedTitle = show.title.replace(new RegExp(`(${query})`, 'gi'), '<span class="text-green-500 font-bold">$1</span>');
                item.innerHTML = highlightedTitle;
                dropdownEl.appendChild(item);
            });
            dropdownEl.classList.remove('hidden');
        }
        function handleSearchInput(event) {
            const query = event.target.value;
            const isDesktop = event.target.id === 'search-input';
            const dropdownEl = isDesktop ? searchDropdown : mobileSearchDropdown;
            updateSearchDropdown(query, dropdownEl);
        }
        function handleSearchSubmit(query) {
             searchDropdown.classList.add('hidden');
             mobileSearchDropdown.classList.add('hidden');
             
             // (MODIFIED) Use replaceState for search redirect if not already on the correct URL
             if (window.history.pushState && window.location.protocol.startsWith('http')) {
                 const newUrl = `grid.html?search=${encodeURIComponent(query)}`;
                 // Use replaceState to change URL immediately upon search submission
                 window.history.replaceState({ path: newUrl }, '', newUrl);
             }
             
             currentGridTag = null; 
             currentSearchQuery = query;
             
             // Run search logic immediately
             performSearch(query);
             renderDynamicNav('search-results'); // (FIX) Update nav state on search
             
             const mobileSearchBarEl = document.getElementById('mobile-search-bar');
             if (mobileSearchBarEl) mobileSearchBarEl.style.display = 'none'; 
        }

        function performSearch(query) {
            if (!query) return;
            
            gridViewTitle.textContent = `ผลการค้นหาสำหรับ "${query}"`;
            currentSearchQuery = query;
            
            if (allShows.length === 0) {
                 gridViewContent.innerHTML = `<p class="text-center w-full col-span-full text-gray-400">ข้อมูลอนิเมะยังไม่ถูกโหลด. โปรดรอสักครู่...</p>`;
                 return;
            }
            
            const normalizedQuery = normalizeThai(query).toLowerCase();
            
            gridFilteredShows = allShows.filter(s => {
                const normalizedTitle = normalizeThai(s.title).toLowerCase();
                const normalizedDesc = normalizeThai(s.description || '').toLowerCase();
                
                return normalizedTitle.includes(normalizedQuery) || normalizedDesc.includes(normalizedQuery);
            });
            
            totalGridPages = Math.ceil(gridFilteredShows.length / ITEMS_PER_PAGE);
            currentGridPage = 1;

            renderPage(1);
            
            gridViewContent.className = 'grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-7 gap-4';
            
            if (gridFilteredShows.length === 0) {
                 gridViewContent.innerHTML = `<p class="text-center w-full col-span-full">ไม่พบผลลัพธ์สำหรับ "${query}"</p>`;
            }
            
        }


        document.addEventListener('DOMContentLoaded', () => {
            
            gridViewContainer = document.getElementById('grid-view-container');
            gridViewTitle = document.getElementById('grid-view-title');
            gridViewContent = document.getElementById('grid-view-content');
            paginationContainer = document.getElementById('pagination-container'); 

            searchInput = document.getElementById('search-input');
            searchDropdown = document.getElementById('search-dropdown');
            mobileSearchInput = document.getElementById('mobile-search-input');
            mobileSearchDropdown = document.getElementById('mobile-search-dropdown');
            
            // (FIX) Re-select elements that were incorrectly referenced globally
            desktopNavLinks = document.getElementById('desktop-nav-links');
            mobileNavLinks = document.getElementById('mobile-nav-links');

            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            const mobileSearchBtn = document.getElementById('mobile-search-button');
            const mobileSearchBar = document.getElementById('mobile-search-bar');
            const mobileCloseSearchBtn = document.getElementById('mobile-close-search');
            
            initializeFirebase(); 
            
            // (NEW FIX) Set the active nav state IMMEDIATELY based on the URL.
            // This stops the "flicker" of the active (green) link.
            const urlParams = new URLSearchParams(window.location.search);
            const tagFromUrl = urlParams.get('tag');
            const searchFromUrl = urlParams.get('search'); 

            let activePageId = 'home'; // Default
            if (searchFromUrl) {
                activePageId = 'search-results'; // This will visually default to 'home'
            } else if (tagFromUrl) {
                activePageId = tagFromUrl;
            } else {
                activePageId = 'อนิเมะ'; // Default grid page
            }
            renderDynamicNav(activePageId);
            
            if (mobileMenuBtn && mobileMenu) {
                mobileMenuBtn.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                    const mobileSearchBarEl = document.getElementById('mobile-search-bar');
                    if (mobileSearchBarEl) mobileSearchBarEl.style.display = 'none'; 
                    searchDropdown.classList.add('hidden');
                });
            }
            
            if (mobileSearchBtn && mobileSearchBar && mobileMenu) {
                mobileSearchBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    mobileSearchBar.style.display = 'flex';
                    mobileMenu.classList.add('hidden'); 
                    searchDropdown.classList.add('hidden');
                });
            }

            if (mobileCloseSearchBtn && mobileSearchBar) {
                mobileCloseSearchBtn.addEventListener('click', () => {
                    mobileSearchBar.style.display = 'none';
                    mobileSearchDropdown.classList.add('hidden');
                });
            }
            
            document.body.addEventListener('click', (e) => {
                 if (searchDropdown && mobileSearchDropdown && !e.target.closest('.relative.search-container')) {
                      searchDropdown.classList.add('hidden');
                      mobileSearchDropdown.classList.add('hidden');
                 }
                
                // (FIX) Re-add logic to handle soft navigation within grid.html
                const navLink = e.target.closest('.nav-link');
                if (navLink) {
                    
                    const pageId = navLink.dataset.page;
                    if (pageId) {
                        // Prevent the full page reload
                        e.preventDefault(); 
                        
                        // Close mobile menu if open
                        if (mobileMenu && !mobileMenu.classList.contains('hidden')) {
                            mobileMenu.classList.add('hidden');
                        }

                        // Check if it's a link to the homepage
                        if (pageId === 'home') {
                            window.location.href = 'index.html'; // Go to index.html
                            return;
                        }
                        
                        // Check if we are already on this tag
                        if (pageId === currentGridTag) {
                            return; // Do nothing if clicking the active tag
                        }

                        // Handle internal navigation (e.g., อนิเมะ -> อนิเมะจีน)
                        currentGridTag = pageId;
                        currentSearchQuery = null; // Clear search
                        
                        // 1. Re-initialize the grid content for the new tag
                        initializeGridPaging(currentGridTag, 1);
                        
                        // 2. Update the active link state
                        renderDynamicNav(currentGridTag);
                        
                        // 3. URL is updated by initializeGridPaging -> renderPage -> updatePageUrl
                    }
                }
            });

            // (NEW) Add popstate listener for back/forward buttons
            window.addEventListener('popstate', (e) => {
                 // On popstate, re-read URL parameters and re-render
                 // (FIX) We also need to update the Nav state when using back/forward
                const popParams = new URLSearchParams(window.location.search);
                const popTag = popParams.get('tag');
                const popSearch = popParams.get('search');
                
                let popActiveId = 'home';
                if (popSearch) {
                    popActiveId = 'search-results';
                } else if (popTag) {
                    popActiveId = popTag;
                } else {
                    popActiveId = 'อนิเมะ'; // Default grid page
                }
                
                renderDynamicNav(popActiveId);
                checkInitialLoad(); // Re-load data for the new state
            });

            // Search Listeners
            const searchButton = document.getElementById('search-button');
            if (searchInput) searchInput.addEventListener('input', handleSearchInput);
            if (mobileSearchInput) mobileSearchInput.addEventListener('input', handleSearchInput);
            if (searchButton && searchInput) searchButton.addEventListener('click', () => handleSearchSubmit(searchInput.value));
            if (searchInput) searchInput.addEventListener('keydown', (e) => e.key === 'Enter' && handleSearchSubmit(searchInput.value));
            if (mobileSearchInput) mobileSearchInput.addEventListener('keydown', (e) => e.key === 'Enter' && handleSearchSubmit(mobileSearchInput.value));

            // Initial URL check is now done inside initializeFirebase -> setupListeners -> checkInitialLoad
        });
    </script>
