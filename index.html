    <!-- Firebase SDK and Application Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";

        // (*** จำลอง Firebase Config เนื่องจาก Canvas ไม่ได้ให้ global vars มาในโหมดนี้ ***)
        const firebaseConfig = {
            apiKey: "AIzaSyDVXZUnw5oiTLqCG00GYdtPTwzOubCSe1o",
            authDomain: "ani-end-94710.firebaseapp.com",
            projectId: "ani-end-94710",
            storageBucket: "ani-end-94710.firebasestorage.app",
            messagingSenderId: "374608108501",
            appId: "1:374608108501:web:19a4767c41a020bfb03b5c",
            measurementId: "G-VZM1XTPMYL"
        };
        
        // (NEW) Global App ID
        const appId = firebaseConfig.projectId;

        // (MODIFIED) Constants for Pagination
        const ITEMS_PER_PAGE = 28; // 7 columns * 4 rows
        
        let db, auth, userId;
        let allShows = []; 
        let allTags = new Set(); 
        let historyItems = []; // (NEW) For storing the latest history items
        let allBanners = []; // (FIX) NEW: Global state for banners
        let currentPageId = 'home'; 
        let heroSwiperInstance = null; // ตัวแปรสำหรับ Swiper
        
        // (NEW) สถานะสำหรับตรวจสอบว่าข้อมูลอนิเมะถูกโหลดครั้งแรกแล้วหรือยัง
        let isDataLoaded = false; 
        
        // (MODIFIED) State for Grid View Pagination (Client-Side Paging)
        let currentGridTag = null; 
        let gridFilteredShows = []; // (NEW) All matching shows for the current tag
        let currentGridPage = 1; // (NEW) The current page number
        let totalGridPages = 1; // (NEW) Total pages for the current filter

        // (MODIFIED) เปลี่ยนทั้งหมดเป็น let และจะกำหนดค่าใน DOMContentLoaded
        let homeView;
        let gridViewContainer;
        let gridViewTitle;
        let gridViewContent;
        let sectionsContainer;
        // (MODIFIED)
        let paginationContainer; // (REPLACED) loadMoreButton;

        let searchInput;
        let searchDropdown;
        let mobileSearchInput;
        let mobileSearchDropdown;
        
        let desktopNavLinks;
        let mobileNavLinks;
        
        // (NEW FUNCTION) Thai Normalization
        function normalizeThai(text) {
            if (typeof text !== 'string') return text;
            // 1. ใช้ String.prototype.normalize('NFC') เพื่อให้มั่นใจว่าอักขระที่รวมกันถูกรวมให้เป็นรูปแบบเดียว
            // NFC = Normalization Form C (Canonical Composition)
            // ตัวอย่าง: U+0E4D (ไม้ไตคู้/ไม้หันอากาศ) + U+0E32 (สระอา) => U+0E33 (สระอำ)
            let normalized = text.normalize('NFC'); 
            
            // 2. เนื่องจาก NFC อาจไม่ครอบคลุมการพิมพ์ผิดบางอย่าง, ให้ตรวจสอบการแทนที่แบบง่ายสำหรับ 'ำ'
            // U+0E4D (ไม้หันอากาศ/ไม้ไต่คู้) ตามด้วย U+0E32 (สระอา) เป็น U+0E33 (สระอำ)
            // (Note: Since NFC already handles the standard canonical composition, this is a fallback/extra check)
            normalized = normalized.replace(/\u0E4D\u0E32/g, '\u0E33');
            
            return normalized; 
        }
        // (END NEW FUNCTION)

        async function initializeFirebase() {
            try {
                const app = initializeApp(firebaseConfig); 
                db = getFirestore(app);
                auth = getAuth(app);
                setLogLevel('Debug'); 

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        userId = user.uid;
                        console.log("User Authenticated (Anonymous):", userId);
                        await setupListeners();
                        // (NEW) Setup History Listener here once user is ready
                        setupHistoryListener();
                    } else {
                        console.log("No user signed in. Attempting sign in...");
                        await signIn();
                    }
                });

            } catch (error) {
                console.error("Firebase Initialization Error:", error);
            }
        }

        async function signIn() {
            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Sign In Error:", error);
            }
        }

        function getCollectionRef(collectionName) {
            const appId = firebaseConfig.projectId;
            return collection(db, `artifacts/${appId}/public/data/${collectionName}`);
        }
        
        // (NEW) Function to get History Collection Ref
        function getHistoryCollectionRef() {
             // (FIXED) ใช้พาธ Private Data
             return collection(db, `artifacts/${appId}/users/${userId}/viewHistory`);
        }

        async function setupListeners() {
            // 1. Listener for Shows (ใช้ onSnapshot และฟิลด์ latestEpisodeNumber ที่ถูกอัปเดตจาก Admin)
            const showsQuery = query(getCollectionRef("shows"));
            onSnapshot(showsQuery, (snapshot) => {
                allShows = [];
                allTags.clear();
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    allShows.push({ id: doc.id, ...data });
                    (data.tags || []).forEach(tag => allTags.add(tag));
                });
                
                console.log("Shows loaded:", allShows.length);
                
                const wasDataLoaded = isDataLoaded;
                isDataLoaded = true; // ตั้งค่าสถานะว่าโหลดข้อมูลแล้ว
                
                // (NEW) ตรวจสอบการค้นหาค้างไว้ (กรณีมาจากการ Redirect)
                if (!wasDataLoaded) {
                    checkInitialSearch();
                }
                
                // (MODIFIED) ตรวจสอบว่าควร render หน้าไหน
                if (currentPageId === 'home') {
                    console.log("Snapshot update: rendering HOME (Sections)");
                    // (FIX) เรียก renderDynamicNav ก่อนเสมอ
                    renderDynamicNav('home'); 
                    renderSections(); // Render home content (carousels only)
                } else if (currentPageId === 'search-results') {
                    console.log("Snapshot update: re-running search for:", currentSearchQuery);
                    // (FIX) ต้องเรียก performSearch ซ้ำ เพื่ออัปเดตผลลัพธ์การค้นหา
                    performSearch(currentSearchQuery); 
                    renderDynamicNav('search-results'); 
                } else if (currentGridTag && currentPageId !== 'home') {
                    // หากมีการอัพทเดทข้อมูลในขณะที่ Grid View เปิดอยู่ ให้ re-initialize การแบ่งหน้า
                    console.log("Snapshot update: re-initializing Grid View for", currentGridTag);
                    renderDynamicNav(currentGridTag);
                    // (MODIFIED)
                    initializeGridPaging(currentGridTag); // Re-initialize and render page 1
                }
                
            }, (error) => {
                console.error("Error listening to shows:", error);
                sectionsContainer.innerHTML = `<p class="text-center text-red-500">ไม่สามารถโหลดข้อมูลได้</p>`;
            });

            // 2. Listener for Banners (แยกออกมา)
            const bannerQuery = query(getCollectionRef("banners"), orderBy("updatedAt", "desc"), limit(7));
            onSnapshot(bannerQuery, (snapshot) => {
                allBanners = []; // (FIX) Store banners in global variable
                snapshot.forEach((doc) => {
                    allBanners.push({ id: doc.id, ...doc.data() });
                });
                console.log("Banners loaded:", allBanners.length);
                // (FIX) เรียก renderHeroSlider ทันทีที่ข้อมูล Banner มาถึง (ครั้งที่ 1)
                renderHeroSlider(); 
            }, (error) => {
                console.error("Error listening to banners:", error);
                const loadingEl = document.getElementById('hero-loading');
                if (loadingEl) {
                    loadingEl.innerHTML = '<p class="text-red-500">ไม่สามารถโหลดแบนเนอร์ได้</p>';
                }
            });
        }
        
        // (NEW FUNCTION) Listener for View History
        function setupHistoryListener() {
            if (!userId) {
                console.log("History listener skipped: userId not available yet.");
                return;
            }
            // (MODIFIED) Limit to 5 latest items for the homepage display
            const historyQuery = query(
                getHistoryCollectionRef(), 
                orderBy("watchedAt", "desc"), 
                limit(5)
            );
            
            onSnapshot(historyQuery, (snapshot) => {
                historyItems = [];
                snapshot.forEach((doc) => {
                    historyItems.push({ id: doc.id, ...doc.data() });
                });
                console.log("Latest history items loaded:", historyItems.length);
                
                // (FIX) เรียก renderHeroSlider ซ้ำอีกครั้งเมื่อ History โหลดเสร็จ (ครั้งที่ 2)
                // เพื่อให้ลิงก์ Banner อัปเดตด้วย ep_id ที่ถูกต้อง
                renderHeroSlider(); 
                
                // (MODIFIED) Only render sections if we are on the home page
                if (currentPageId === 'home') {
                    renderSections(); 
                }
                
            }, (error) => {
                console.error("Error listening to view history:", error);
                // (FIX) Render sections anyway, but history section will show an error
                if (currentPageId === 'home') {
                    renderSections(); 
                }
            });
        }
        
        // (NEW) Variable to hold the query from URL
        let initialQueryFromUrl = null;
        let currentSearchQuery = null; // Store the current query when on search results page

        // (NEW) Function to check if a search was requested via URL on initial load
        function checkInitialSearch() {
            if (initialQueryFromUrl) {
                console.log("Performing initial search from URL:", initialQueryFromUrl);
                performSearch(initialQueryFromUrl);
                // Clear the initial query after execution
                initialQueryFromUrl = null; 
            }
        }


        function renderDynamicNav(activePageId = 'home') {
            // (FIX) ตรวจสอบว่า Elements ถูกกำหนดค่าแล้วหรือไม่ (เนื่องจากอาจถูกเรียกใน setupListeners ก่อน DOMContentLoaded)
            if (!desktopNavLinks || !mobileNavLinks) {
                console.error("Navigation elements are not yet loaded or initialized.");
                return;
            }

            const homeLink = `<a href="#" data-page="home" class="nav-link px-3 py-2 rounded-md text-sm font-medium ${activePageId === 'home' ? 'active text-green-500' : 'text-gray-300 hover:text-white hover:bg-gray-700'}">หน้าแรก</a>`;
            desktopNavLinks.innerHTML = homeLink;
            mobileNavLinks.innerHTML = `<a href="#" data-page="home" class="nav-link block px-3 py-2 rounded-md text-base font-medium ${activePageId === 'home' ? 'active text-green-500' : 'text-gray-300 hover:text-white hover:bg-gray-700'}">หน้าแรก</a>`;

            const mainTags = ['อนิเมะ', 'อนิเมะจีน', 'อนิเมะพากย์ไทย'];
            
            mainTags.forEach(tag => {
                const link = `<a href="#" data-page="${tag}" class="nav-link px-3 py-2 rounded-md text-sm font-medium ${activePageId === tag ? 'active text-green-500' : 'text-gray-300 hover:text-white hover:bg-gray-700'}">${tag}</a>`;
                const mobileLink = `<a href="#" data-page="${tag}" class="nav-link block px-3 py-2 rounded-md text-base font-medium ${activePageId === tag ? 'active text-green-500' : 'text-gray-300 hover:text-white hover:bg-gray-700'}">${tag}</a>`;
                desktopNavLinks.innerHTML += link;
                mobileNavLinks.innerHTML += mobileLink;
            });
        }

        // *** ตรรกะ Banner: ใช้ allBanners และค้นหา historyItem เพื่อสร้างลิงก์ที่มี ep_id ***
        // (FIX) ไม่มีพารามิเตอร์แล้ว เพราะใช้ allBanners
        function renderHeroSlider() {
            const banners = allBanners; // (FIX) ใช้ Global Banners
            const swiperWrapper = document.querySelector('#hero-swiper .swiper-wrapper');
            const loadingEl = document.getElementById('hero-loading');
            
            if (!swiperWrapper || !loadingEl) return;
            
            // 1. (FIX) ทำลาย Swiper Instance เก่าก่อนเสมอ หากมีอยู่
            if (heroSwiperInstance) {
                heroSwiperInstance.destroy(true, true);
                heroSwiperInstance = null;
            }

            if (banners.length === 0) {
                loadingEl.innerHTML = '<p class="text-gray-400">ยังไม่มีแบนเนอร์ในระบบ</p>';
                loadingEl.classList.remove('hidden');
                swiperWrapper.innerHTML = ''; // Ensure wrapper is clean
                return;
            }
            
            let slidesHtml = '';
            banners.forEach(banner => {
                // (NEW LOGIC) 1. หาประวัติการเข้าชมสำหรับ Show ID นี้
                const historyItem = historyItems.find(h => h.showId === banner.showId);
                let targetUrl = `player.html?id=${banner.showId}`;
                
                // (NEW LOGIC) 2. ถ้ามีประวัติดูค้างไว้ ให้เพิ่ม ep_id
                if (historyItem && historyItem.lastWatchedEpisodeId) {
                    // *** ยืนยัน: ลิงก์จาก Banner จะพาไปยังตอนที่ดูค้างไว้ (ep_id) ***
                    targetUrl = `player.html?id=${banner.showId}&ep_id=${historyItem.lastWatchedEpisodeId}`;
                }

                slidesHtml += `
                    <!-- (MODIFIED) ใช้ targetUrl ที่ถูกปรับแล้ว -->
                    <a href="${targetUrl}" class="swiper-slide">
                        <img src="${banner.bannerImageUrl}" alt="Banner" class="w-full h-full object-cover">
                    </a>
                `;
            });
            
            swiperWrapper.innerHTML = slidesHtml;
            loadingEl.classList.add('hidden'); // ซ่อน Loading
            
            // 2. (FIX) สร้าง Swiper Instance ใหม่เสมอ เมื่อมี Banner
            heroSwiperInstance = new Swiper('#hero-swiper', {
                // (MODIFIED) เปิด loop ถ้ามีมากกว่า 1 สไลด์
                loop: banners.length > 1, 
                autoplay: {
                    delay: 4000,
                    disableOnInteraction: false,
                },
                pagination: {

                    const timeA = a.createdAt ? a.createdAt.toMillis() : 0;
                    const timeB = b.createdAt ? b.createdAt.toMillis() : 0;
                    return timeB - timeA; // เรียงจากเวลาสร้างล่าสุด (มากที่สุด) ไปยังเวลาเก่าที่สุด (น้อยที่สุด)

        // *** ตรรกะ Content Card: รับ historyItem และสร้างลิงก์ที่มี ep_id ***

            // (MODIFIED LOGIC) ตรวจสอบประวัติการดูค้าง (ใช้ history ที่ถูกส่งมาจาก caller)
            const watchedEpisodeId = history ? history.lastWatchedEpisodeId : null;
            let targetUrl = `player.html?id=${show.id}`;

                // (FIX) ถ้ามีประวัติดูค้างไว้ ให้อัปเดต URL ด้วย ep_id

                targetUrl = `player.html?id=${show.id}&ep_id=${watchedEpisodeId}`;

            // ใช้ฟิลด์ isCompleted ที่ถูกอัปเดตจาก admin.html
            const isCompleted = show.isCompleted === true;
            const completedBadge = isCompleted ? `

            // 4. ป้ายบอกตอนล่าสุด (มุมล่างขวา)
            let episodeBadge = '';
            // ใช้ฟิลด์ latestEpisodeNumber ที่ถูกอัปเดตจาก admin.html
            const latestEpisode = show.latestEpisodeNumber || 0;

                            ${rankBadge}
                            ${dubBadge}
                            ${episodeBadge} <!-- ป้ายตอนล่าสุด (มุมล่างขวา) -->
                            <img src="${show.thumbnailUrl || 'https://placehold.co/400x600/333/fff?text=No+Img'}" 
                                 alt="${show.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                            ${completedBadge} <!-- ป้ายจบแล้ว (มุมล่างซ้าย) -->
                        </div>
                        <!-- 2. ส่วนชื่อเรื่อง (Title - อยู่ใต้ภาพ) -->
                        <!-- *** MODIFIED: ย้าย min-h-[3.5rem] ออก และใช้ p-3 pt-2 h-14 เพื่อบังคับความสูง 2 บรรทัด (Fix for Carousel Swiper) *** -->
                        <div class="text-white p-3 pt-2 h-14"> 
                            <!-- (MODIFIED) เปลี่ยนเป็น text-base เพื่อให้ใหญ่ขึ้นและให้พื้นที่มากขึ้น -->

        // (MODIFIED) Function to initialize client-side pagination for Grid View
        function initializeGridPaging(tag) {
            currentGridTag = tag;
            gridViewTitle.textContent = tag;
            currentSearchQuery = null; // Clear search query when viewing tags
            
            // 1. Filter and Sort all shows on the client side
            gridFilteredShows = allShows
                .filter(s => (s.tags || []).includes(tag))
                // (MODIFIED) เปลี่ยนตรรกะการจัดเรียง: เรียงตาม 'updatedAt' จากมากไปน้อย (ล่าสุดก่อน)
                .sort((a, b) => {
                    // Firestore Timestamp ถูกแปลงเป็น Object ธรรมดาเมื่อโหลด
                    const timeA = a.updatedAt ? a.updatedAt.toMillis() : 0;
                    const timeB = b.updatedAt ? b.updatedAt.toMillis() : 0;
                    return timeB - timeA; // เรียงจากเวลาล่าสุด (มากที่สุด) ไปยังเวลาเก่าที่สุด (น้อยที่สุด)
                });

            totalGridPages = Math.ceil(gridFilteredShows.length / ITEMS_PER_PAGE);
            currentGridPage = 1;

            // (MODIFIED)
            gridViewContent.innerHTML = '';
            paginationContainer.innerHTML = '';
            gridViewContainer.style.display = 'block';
            homeView.style.display = 'none';
            
            // Show loading text momentarily
            gridViewContent.innerHTML = `<p class="text-center w-full col-span-full text-gray-400">กำลังจัดเรียงและโหลดรายการ...</p>`;

            // 2. Render the first page
            renderPage(1);

            // 3. Ensure layout is correct
            gridViewContent.className = 'grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-7 gap-4';
        }

        // (NEW) Function to render a specific page number
        function renderPage(pageNumber) {
            if (pageNumber < 1 || pageNumber > totalGridPages) return;
            
            currentGridPage = pageNumber;
            gridViewContent.innerHTML = '';
            
            const startIndex = (pageNumber - 1) * ITEMS_PER_PAGE;
            const endIndex = Math.min(startIndex + ITEMS_PER_PAGE, gridFilteredShows.length);
            const showsToRender = gridFilteredShows.slice(startIndex, endIndex);

            if (showsToRender.length > 0) {
                showsToRender.forEach((show) => {
                    const historyItem = historyItems.find(h => h.showId === show.id);
                    gridViewContent.innerHTML += createContentCard(show, null, historyItem); // ใช้ createContentCard ที่อัปเดตแล้ว
                });
            } else if (pageNumber === 1) {
                 // No shows found at all
                gridViewContent.innerHTML = `<p class="text-center w-full col-span-full">ไม่พบอนิเมะสำหรับ "${currentGridTag}"</p>`;
            }
            
            // Scroll to top of grid
            if (gridViewContainer) {
                 gridViewContainer.scrollIntoView({ behavior: 'smooth' });
            }

            renderPaginationControls();
        }
        
        // (NEW) Function to render pagination buttons
        function renderPaginationControls() {
            if (!paginationContainer) return;
            paginationContainer.innerHTML = '';
            
            if (totalGridPages <= 1) return; // Don't show if only 1 page

            const maxVisibleButtons = 7; // Max buttons to show (e.g., 1 ... 4 5 6 ... 10)
            let buttonsHtml = '';

            // Previous Button
            buttonsHtml += createPageButton('«', currentGridPage - 1, 'nav', currentGridPage === 1);

            if (totalGridPages <= maxVisibleButtons) {
                // Show all pages
                for (let i = 1; i <= totalGridPages; i++) {
                    buttonsHtml += createPageButton(i, i, 'page', false, i === currentGridPage);
                }
            } else {
                // Show truncated pages
                let start = Math.max(1, currentGridPage - 2);
                let end = Math.min(totalGridPages, currentGridPage + 2);

                if (currentGridPage - 1 <= 2) {
                    end = Math.min(totalGridPages, maxVisibleButtons - 2);
                }
                if (totalGridPages - currentGridPage <= 2) {
                    start = Math.max(1, totalGridPages - maxVisibleButtons + 3);
                }

                // Page 1
                if (start > 1) {
                    buttonsHtml += createPageButton(1, 1, 'page');
                }
                // ... (dots)
                if (start > 2) {
                    buttonsHtml += createPageButton('...', -1, 'dots', true);
                }
                
                // Middle pages
                for (let i = start; i <= end; i++) {
                    buttonsHtml += createPageButton(i, i, 'page', false, i === currentGridPage);
                }
                
                // ... (dots)
                if (end < totalGridPages - 1) {
                     buttonsHtml += createPageButton('...', -1, 'dots', true);
                }
                // Last page
                if (end < totalGridPages) {
                    buttonsHtml += createPageButton(totalGridPages, totalGridPages, 'page');
                }
            }

            // Next Button
            buttonsHtml += createPageButton('»', currentGridPage + 1, 'nav', currentGridPage === totalGridPages);
            
            paginationContainer.innerHTML = buttonsHtml;
        }
        
        // (NEW) Helper function to create a single pagination button
        function createPageButton(text, page, type, isDisabled = false, isActive = false) {
             const activeClass = isActive ? 'active' : '';
             const disabledAttr = isDisabled ? 'disabled' : '';
             const pageData = type === 'page' ? `data-page="${page}"` : '';
             const navData = type === 'nav' ? `data-page="${page}"` : '';
             
             if (type === 'dots') {
                return `<button class="pagination-btn dots" disabled>...</button>`;
             }
             
             return `
                <button class="pagination-btn ${type} ${activeClass}" ${pageData} ${navData} ${disabledAttr}>
                    ${text}
                </button>
             `;
        }

        // (MODIFIED) เปลี่ยน renderGridView ให้เป็นการเรียก initializeGridPaging สำหรับชุดแรก
        function renderGridView(tag) {
            // เมื่อเรียก renderGridView ใหม่ ให้ตั้งค่าทุกอย่างเป็นเริ่มต้นและโหลดหน้าแรก
            initializeGridPaging(tag);
        }
        
        // (FIX) เพิ่มการตรวจสอบ URL เพื่อหลีกเลี่ยง SecurityError เมื่อใช้ replaceState
        function isSecureEnvironment() {
            // ตรวจสอบว่า URL ไม่ได้ขึ้นต้นด้วย 'blob:' หรือ 'file:'
            const url = window.location.protocol;
            return url !== 'blob:' && url !== 'file:';
        }

        function showPage(pageId) {

            renderDynamicNav(pageId); 

            if (pageId === 'home') {

                gridViewContainer.style.display = 'none';

                paginationContainer.innerHTML = ''; // ซ่อนปุ่มแบ่งหน้า
                currentSearchQuery = null;
                
                // (MODIFIED) เพิ่ม isSecureEnvironment() check
                if (window.history.replaceState && isSecureEnvironment()) {
                    try {
                        const cleanUrl = window.location.pathname;
                        window.history.replaceState({path: cleanUrl}, '', cleanUrl);
                    } catch (e) {
                         console.warn("Could not use history.replaceState:", e.message);
                    }
                }
                
            } else if (pageId === 'search-results') {

                paginationContainer.innerHTML = ''; // ซ่อนปุ่มแบ่งหน้าสำหรับหน้าค้นหา
                
                // Note: performSearch will be called separately/later
                
            } else {
                // This handles 'อนิเมะ', 'อนิเมะจีน', 'อนิเมะพากย์ไทย'
                homeView.style.display = 'none';
                gridViewContainer.style.display = 'block';
                renderGridView(pageId); // Calls the new pagination logic

        }

        // --- Live Search (No pagination needed for small dropdown) ---
        function updateSearchDropdown(query, dropdownEl) {
            // (MODIFIED) Normalize query
            const normalizedQuery = normalizeThai(query).toLowerCase().trim();
            dropdownEl.innerHTML = '';
            
            if (normalizedQuery.length < 2) {
                dropdownEl.classList.add('hidden');
                return;
            }
            const results = allShows
                // (MODIFIED) Normalize show title before comparison
                .filter(s => normalizeThai(s.title).toLowerCase().includes(normalizedQuery))
                .slice(0, 10); 
            if (results.length === 0) {
                dropdownEl.innerHTML = '<a class="block p-3 text-sm text-gray-400">ไม่พบผลลัพธ์</a>';
                dropdownEl.classList.remove('hidden');
                return;
            }
            results.forEach(show => {
                const item = document.createElement('a');
                // *** FIX: ตรรกะนี้ต้องค้นหาประวัติการดูค้างด้วย เพื่อให้ลิงก์ Search Dropdown ถูกต้อง ***
                const historyItem = historyItems.find(h => h.showId === show.id);
                const targetUrl = historyItem ? `player.html?id=${show.id}&ep_id=${historyItem.lastWatchedEpisodeId}` : `player.html?id=${show.id}`;
                item.href = targetUrl;
                
                item.className = 'search-dropdown-item block p-3 text-sm font-medium text-gray-200';
                
                // (FIXED) ใช้ query เดิมในการ highlight แต่ควรระวังเรื่อง normalization
                // Note: For simplicity, we use the raw query for highlighting, but the filter uses normalized text.
                const highlightedTitle = show.title.replace(new RegExp(`(${query})`, 'gi'), '<span class="text-green-500 font-bold">$1</span>');
                item.innerHTML = highlightedTitle;
                dropdownEl.appendChild(item);
            });
            dropdownEl.classList.remove('hidden');
        }
        function handleSearchInput(event) {
            const query = event.target.value;
            const isDesktop = event.target.id === 'search-input';
            const dropdownEl = isDesktop ? searchDropdown : mobileSearchDropdown;
            updateSearchDropdown(query, dropdownEl);
        }
        function handleSearchSubmit(query) {
             searchDropdown.classList.add('hidden');
             mobileSearchDropdown.classList.add('hidden');
             if (query && mobileSearchInput.value) {
                 mobileSearchInput.value = '';
                 // (FIX) เข้าถึง Element โดยตรงเนื่องจากอาจยังไม่ได้กำหนดค่าในตัวแปร
                 document.getElementById('mobile-search-bar').style.display = 'none'; 
             }
             // (MODIFIED) หากข้อมูลโหลดแล้ว ให้ทำการค้นหาเลย
             if (isDataLoaded) {
                 performSearch(query);
             } else {
                 // (FIX) ถ้าข้อมูลยังไม่โหลด ให้ตั้งค่า query และรอ Snapshot ครั้งแรก
                 initialQueryFromUrl = query;
                 showPage('search-results'); 
                 gridViewTitle.textContent = `กำลังค้นหาสำหรับ "${query}"...`;
                 gridViewContent.innerHTML = `<p class="text-center w-full col-span-full text-gray-400">กำลังโหลดข้อมูลและค้นหา...</p>`;
             }
        }
        // --- End Live Search ---

        function performSearch(query) {
            if (!query) return;
            
            // 1. ตั้งค่าสถานะหน้าและ query
            showPage('search-results'); 
            currentSearchQuery = query; // เก็บ query ปัจจุบัน
            
            gridViewTitle.textContent = `ผลการค้นหาสำหรับ "${query}"`;
            gridViewContent.innerHTML = '';
            
            // (MODIFIED) Normalize query
            const normalizedQuery = normalizeThai(query).toLowerCase();
            
            // 2. กรองผลลัพธ์ (ต้องแน่ใจว่า allShows ถูกโหลดแล้ว)
            if (allShows.length === 0) {
                 gridViewContent.innerHTML = `<p class="text-center w-full col-span-full text-gray-400">ข้อมูลอนิเมะยังไม่ถูกโหลด. โปรดรอสักครู่...</p>`;
                 return;
            }
            
            // Search uses allShows array
            const results = allShows.filter(s => {
                // (MODIFIED) Normalize Show Title and Description
                const normalizedTitle = normalizeThai(s.title).toLowerCase();
                const normalizedDesc = normalizeThai(s.description || '').toLowerCase();
                
                return normalizedTitle.includes(normalizedQuery) || normalizedDesc.includes(normalizedQuery);
            });
            
            // 3. แสดงผล
            if (results.length === 0) {
                // (FIX) แสดงข้อความไม่พบผลลัพธ์
                gridViewContent.innerHTML = `<p class="text-center w-full col-span-full">ไม่พบผลลัพธ์สำหรับ "${query}"</p>`;
                return;
            }
            
            // (MODIFIED) Ensure grid view class is set correctly
            gridViewContent.className = 'grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-7 gap-4';
            results.forEach(show => {
                // (MODIFIED) ต้องส่ง historyItems เข้าไปด้วย
                const historyItem = historyItems.find(h => h.showId === show.id);
                gridViewContent.innerHTML += createContentCard(show, null, historyItem);
            });
            // (MODIFIED)
            paginationContainer.innerHTML = ''; // Hide pagination for search results
        }

        document.addEventListener('DOMContentLoaded', () => {
            
            // (MODIFIED) กำหนดค่าให้กับตัวแปร UI Elements ทั้งหมดภายใน DOMContentLoaded
            homeView = document.getElementById('home-view');
            gridViewContainer = document.getElementById('grid-view-container');
            gridViewTitle = document.getElementById('grid-view-title');
            gridViewContent = document.getElementById('grid-view-content');
            sectionsContainer = document.getElementById('sections-container');
            // (MODIFIED)
            paginationContainer = document.getElementById('pagination-container'); 

            searchInput = document.getElementById('search-input');
            searchDropdown = document.getElementById('search-dropdown');
            mobileSearchInput = document.getElementById('mobile-search-input');
            mobileSearchDropdown = document.getElementById('mobile-search-dropdown');
            
            desktopNavLinks = document.getElementById('desktop-nav-links');
            mobileNavLinks = document.getElementById('mobile-nav-links');

            // Mobile Menu Elements
            const mobileMenuBtn = document.getElementById('mobile-menu-btn');
            const mobileMenu = document.getElementById('mobile-menu');
            const mobileSearchBtn = document.getElementById('mobile-search-button');
            const mobileSearchBar = document.getElementById('mobile-search-bar');
            const mobileCloseSearchBtn = document.getElementById('mobile-close-search');
            
            initializeFirebase(); 
            // renderDynamicNav('home'); // ไม่ต้องเรียกซ้ำ เพราะ setupListeners จะเรียกเองหลังโหลดข้อมูลเสร็จ
            
            // (FIX) เพิ่มการตรวจสอบก่อนกำหนด Event Listeners
            if (mobileMenuBtn && mobileMenu) {
                mobileMenuBtn.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                    // (FIX) เข้าถึง Element โดยตรงเนื่องจาก mobileSearchBar ไม่ใช่ตัวแปร global
                    const mobileSearchBarEl = document.getElementById('mobile-search-bar');
                    if (mobileSearchBarEl) mobileSearchBarEl.style.display = 'none'; 
                    searchDropdown.classList.add('hidden');
                });
            }
            
            if (mobileSearchBtn && mobileSearchBar && mobileMenu) {
                mobileSearchBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    mobileSearchBar.style.display = 'flex';
                    mobileMenu.classList.add('hidden'); 
                    searchDropdown.classList.add('hidden');
                });
            }

            if (mobileCloseSearchBtn && mobileSearchBar) {
                mobileCloseSearchBtn.addEventListener('click', () => {
                    mobileSearchBar.style.display = 'none';
                    mobileSearchDropdown.classList.add('hidden');
                });
            }
            
            document.body.addEventListener('click', (e) => {
                 // (FIX) ต้องเช็คว่า searchDropdown และ mobileSearchDropdown มีค่าก่อน
                 if (searchDropdown && mobileSearchDropdown && !e.target.closest('.relative.search-container')) {
                      searchDropdown.classList.add('hidden');
                      mobileSearchDropdown.classList.add('hidden');
                 }
                const navLink = e.target.closest('.nav-link');
                if (navLink) {
                    e.preventDefault();
                    const pageId = navLink.dataset.page;
                    showPage(pageId);
                    if (mobileMenu && !mobileMenu.classList.contains('hidden')) {
                        mobileMenu.classList.add('hidden');
                    }
                }
            });

            // Search Listeners
            const searchButton = document.getElementById('search-button');
            if (searchInput) searchInput.addEventListener('input', handleSearchInput);
            if (mobileSearchInput) mobileSearchInput.addEventListener('input', handleSearchInput);
            if (searchButton && searchInput) searchButton.addEventListener('click', () => handleSearchSubmit(searchInput.value));
            if (searchInput) searchInput.addEventListener('keydown', (e) => e.key === 'Enter' && handleSearchSubmit(searchInput.value));
            if (mobileSearchInput) mobileSearchInput.addEventListener('keydown', (e) => e.key === 'Enter' && handleSearchSubmit(mobileSearchInput.value));

            // (NEW) Pagination Click Listener (Event Delegation)
            if (paginationContainer) {
                paginationContainer.addEventListener('click', (e) => {
                    const button = e.target.closest('.pagination-btn');
                    if (!button || button.disabled || button.classList.contains('dots')) return;

                    const page = parseInt(button.dataset.page, 10);
                    if (page && page !== currentGridPage) {
                        renderPage(page);
                    }
                });
            }
            
            // (FIX) ตรรกะตรวจสอบ URL ตอนเริ่มโหลด (ย้ายมาไว้ด้านล่าง)
            const urlParams = new URLSearchParams(window.location.search);
            const pageFromUrl = urlParams.get('page');
            const searchFromUrl = urlParams.get('search'); // ดึงคำค้นหาจาก URL

            if (searchFromUrl) {
                // (MODIFIED) หากมีคำค้นหา ให้ตั้งค่า initialQueryFromUrl และแสดงหน้า Search Results
                initialQueryFromUrl = decodeURIComponent(searchFromUrl);
                currentPageId = 'search-results'; 
                showPage(currentPageId);
                // checkInitialSearch() จะถูกเรียกหลังจากข้อมูลโหลดใน setupListeners
                
            } else if (pageFromUrl) {
                currentPageId = pageFromUrl; // ตั้งค่า global state
                console.log("Page requested from URL on load:", pageFromUrl);
                
                // (MODIFIED) โหลดหน้าแรกของ Grid View หากมีการระบุ tag
                if (['อนิเมะ', 'อนิเมะจีน', 'อนิเมะพากย์ไทย'].includes(pageFromUrl)) {
                    showPage(pageFromUrl);
                } else {
                    showPage(pageFromUrl);
                }
                
                // (MODIFIED) เพิ่ม isSecureEnvironment() check
                if (window.history.replaceState && isSecureEnvironment()) {
                    try {
                        const cleanUrl = window.location.pathname;
                        window.history.replaceState({path: cleanUrl}, '', cleanUrl);
                    } catch (e) {
                         console.warn("Could not use history.replaceState on load:", e.message);
                    }
                }
            } 
            
            // ถ้าไม่มีทั้ง page และ search ก็จะใช้ค่า default 'home' และรอ setupListeners
        });
    </script>
