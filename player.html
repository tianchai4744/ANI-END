        // (NEW FUNCTION) Thai Normalization
        function normalizeThai(text) {
            if (typeof text !== 'string') return text;
            // 1. ใช้ String.prototype.normalize('NFC') เพื่อให้มั่นใจว่าอักขระที่รวมกันถูกรวมให้เป็นรูปแบบเดียว
            // NFC = Normalization Form C (Canonical Composition)
            let normalized = text.normalize('NFC'); 
            
            // 2. เนื่องจาก NFC อาจไม่ครอบคลุมการพิมพ์ผิดบางอย่าง, ให้ตรวจสอบการแทนที่แบบง่ายสำหรับ 'ำ'
            normalized = normalized.replace(/\u0E4D\u0E32/g, '\u0E33');
            
            return normalized; 
        }
        // (END NEW FUNCTION)


        // ฟังก์ชันช่วยสำหรับอ้างอิง Collection
        function getCollectionRef(collectionName) {
            return collection(db, `artifacts/${appId}/public/data/${collectionName}`);
        }
        
        /**
         * (NEW FUNCTION) Load History Items Once (สำหรับใช้ใน Related Shows และ Top 10)
         * โหลดประวัติการดู 50 รายการล่าสุดเพื่อใช้ในการสร้างลิงก์สำหรับ Related Card
         */
        async function loadHistoryOnce() {
            if (!userId) return;
            try {
                // Query Top 50 recent history items to cover all possible related shows
                const historyQuery = query(
                    collection(db, `artifacts/${appId}/users/${userId}/viewHistory`), 
                    orderBy("watchedAt", "desc"), 
                    limit(50) 
                );
                const snapshot = await getDocs(historyQuery);
                historyItems = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                console.log("Loaded history items for related content checking:", historyItems.length);
            } catch (error) {
                console.error("Error loading history for related shows:", error);
            }
        }
        
        // (NEW FUNCTION) บันทึกประวัติการเข้าชม
        async function saveToHistory(episode) {
            // ตรวจสอบว่ามีข้อมูลครบถ้วนหรือไม่ (userId, currentShow, episode)
            if (!userId || !currentShow || !episode || !episode.id) {
                console.warn("ไม่สามารถบันทึกประวัติได้: ข้อมูลไม่ครบถ้วน");
                return;
            }

            try {
                // (FIXED) แก้ไขพาธให้ตรงกับกฎความปลอดภัย Private Data: /artifacts/{appId}/users/{userId}/viewHistory/{showId}
                const historyRef = doc(db, 
                    `artifacts/${appId}/users/${userId}/viewHistory`, 
                    currentShow.id // ใช้ Show ID เป็น Key
                );

                // ข้อมูลที่เราอยากเก็บไว้
                const historyData = {
                    showId: currentShow.id,
                    showTitle: currentShow.title,
                    showThumbnail: currentShow.thumbnailUrl || '',
                    
                    lastWatchedEpisodeId: episode.id,
                    lastWatchedEpisodeTitle: episode.title,
                    lastWatchedEpisodeNumber: episode.episodeNumber,
                    
                    // (NEW) เพิ่มฟิลด์ isCompleted และ latestEpisodeNumber จาก Show Data
                    isCompleted: currentShow.isCompleted === true,
                    latestEpisodeNumber: currentShow.latestEpisodeNumber || 0,
                    
                    watchedAt: serverTimestamp() // บันทึกเวลาล่าสุดที่ดู
                };

                // ใช้ setDoc (และ merge: true) เพื่อสร้างใหม่ หรือ อัปเดตเฉพาะข้อมูลล่าสุด
                await setDoc(historyRef, historyData, { merge: true }); 
                
                console.log("บันทึกประวัติการเข้าชมเรียบร้อย:", currentShow.title);

            } catch (error) {
                console.error("เกิดข้อผิดพลาดในการบันทึกประวัติ:", error);
            }
        }
        
        // (MODIFIED) Function to handle the Iframe embed 
        function embedVideo(embedCode) {
            console.log("Using standard iframe embed (Final attempt to fix mobile offset).");
            
            playerEmbedDiv.innerHTML = ''; // Clear previous content

            if (!embedCode) {
                 playerEmbedDiv.innerHTML = `<p class="text-red-500 p-4">ไม่พบลิงก์วิดีโอสำหรับตอนนี้</p>`;
                 return;
            }
            
            let iframeElement = null;

            // 2. ถ้าเป็น URL ธรรมดา (ไม่ใช่ Embed HTML)
            if (embedCode.trim().startsWith('http') && !embedCode.trim().toLowerCase().includes('<iframe')) {
                let videoUrlStr = embedCode;
                
                // พยายามเพิ่ม autoplay=1
                try {
                    const videoUrl = new URL(videoUrlStr);
                    videoUrl.searchParams.set('autoplay', '1');
                    videoUrlStr = videoUrl.href;
                } catch (e) {
                    console.warn("Could not parse URL to add params, trying string append:", e);
                    videoUrlStr += (videoUrlStr.includes('?') ? '&' : '?') + 'autoplay=1';
                }

                iframeElement = document.createElement('iframe');
                iframeElement.src = videoUrlStr; 
                
            } else if (embedCode) {
                // 3. กรณีเป็น <iframe> tag (HTML string) อื่นๆ (ใช้โค้ดที่แปลงจาก Admin Panel)
                let finalEmbedCode = embedCode;
                
                // สร้าง DOM element จาก HTML string (เพื่อหลีกเลี่ยงการใช้ innerHTML กับโค้ดทั้งหมด)
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = finalEmbedCode;
                iframeElement = tempDiv.querySelector('iframe');
                
            } 
            
            if (iframeElement) {
                // ตั้งค่า attributes ที่จำเป็น (สำหรับทั้ง URL และ Embed Code)
                iframeElement.removeAttribute('width');
                iframeElement.removeAttribute('height');
                iframeElement.setAttribute('frameborder', '0');
                iframeElement.setAttribute('allow', 'autoplay; fullscreen'); 
                iframeElement.setAttribute('webkitallowfullscreen', 'true');
                iframeElement.setAttribute('mozallowfullscreen', 'true');
                iframeElement.setAttribute('allowfullscreen', 'true');
                
                // 4. เพิ่ม iframe เข้าไปใน Player Div โดยตรง
                playerEmbedDiv.appendChild(iframeElement);
            } else {
                // ถ้าไม่มี iframe element (เช่น raw embed code ที่ไม่สมบูรณ์)
                playerEmbedDiv.innerHTML = `<p class="text-red-500 p-4">ไม่พบโค้ดวิดีโอที่ถูกต้องสำหรับตอนนี้</p>`;
                return;
            }
        }
        
        // (NEW) Function to load all shows for client-side search
        async function loadAllShowsForSearch() {
             try {
                const showsQuery = query(getCollectionRef("shows"));
                const snapshot = await getDocs(showsQuery);
                allShows = [];
                snapshot.forEach((doc) => {
                    allShows.push({ id: doc.id, ...doc.data() });
                });
                console.log("All shows loaded for search:", allShows.length);
             } catch (error) {
                 console.error("Error loading all shows for search:", error);
             }
        }
        
        // (MODIFIED) Search Logic: Always redirect to grid.html with the query
        function handleSearchSubmit(query) { 
             const lowerQuery = query.toLowerCase().trim();
             if (!lowerQuery) return;
             
             // FIX: If the query is submitted, redirect to grid.html.
             window.location.href = `grid.html?search=${encodeURIComponent(query)}`;
        }
        
        // (NEW) Search UI Toggles
        function toggleMobileSearch(show) {
             const mobileSearchBar = document.getElementById('mobile-search-bar');
             const mobileMenu = document.getElementById('mobile-menu');
             if (mobileSearchBar && mobileMenu) {
                 if (show) {
                    mobileSearchBar.style.display = 'flex';
                    mobileMenu.classList.add('hidden');
                 } else {
                    mobileSearchBar.style.display = 'none';
                 }
             }
        }
        
        // (MODIFIED) Live Search Dropdown Logic
        function updateSearchDropdown(query, dropdownEl, isMobile) {
            // (MODIFIED) Normalize query and convert to lowercase
            const normalizedQuery = normalizeThai(query).toLowerCase().trim();
            
            if (!dropdownEl) return;
            
            // (FIX) Check if allShows is empty/not loaded yet
            if (allShows.length === 0) {
                 dropdownEl.innerHTML = '<a class="block p-3 text-sm text-gray-400">กำลังโหลดข้อมูลอนิเมะ...</a>';
                 dropdownEl.classList.remove('hidden');
                 return;
            }
            
            // (MODIFIED) Check normalized query length
            if (normalizedQuery.length < 2) {
                dropdownEl.classList.add('hidden');
                dropdownEl.innerHTML = '';
                return;
            }
            
            const results = allShows
                // (MODIFIED) Normalize show title before comparison
                .filter(s => normalizeThai(s.title).toLowerCase().includes(normalizedQuery))
                .slice(0, 10); 
                
            dropdownEl.innerHTML = '';
            
            if (results.length === 0) {
                // (MODIFIED) Display "No results" message (This remains for the live feedback)
                dropdownEl.innerHTML = '<a class="block p-3 text-sm text-gray-400">ไม่พบผลลัพธ์</a>';
                dropdownEl.classList.remove('hidden'); // Show the "No result" message
                return;
            }
            
            results.forEach(show => {
                const item = document.createElement('a');
                // (FIX) Use the standard link target logic (no history check here)
                const historyItem = historyItems.find(h => h.showId === show.id);
                const targetUrl = historyItem ? `player.html?id=${show.id}&ep_id=${historyItem.lastWatchedEpisodeId}` : `player.html?id=${show.id}`;
                item.href = targetUrl;

                // item.href = `player.html?id=${show.id}`; // Old code
                
                item.className = 'search-dropdown-item block p-3 text-sm font-medium text-gray-200';
                
                // Highlight คำที่ค้นหา (ใช้ query เดิมสำหรับการเน้น)
                const highlightedTitle = show.title.replace(new RegExp(`(${query})`, 'gi'), '<span class="text-green-500 font-bold">$1</span>');
                item.innerHTML = highlightedTitle;
                dropdownEl.appendChild(item);
            });
            
            dropdownEl.classList.remove('hidden');
        }
        
        // (NEW) Handle Input event for Live Search
        function handleSearchInput(event) {
            const query = event.target.value;
            const isDesktop = event.target.id === 'search-input-desktop';
            
            let dropdownEl = null;
            if (isDesktop && searchDropdown) {
                dropdownEl = searchDropdown;
            } else if (!isDesktop && mobileSearchDropdown) {
                 dropdownEl = mobileSearchDropdown;
            }
            
            if (dropdownEl) {
                 updateSearchDropdown(query, dropdownEl, !isDesktop);
            }
        }

        // (NEW FUNCTION) Update Next/Prev Button States
        function updateNavButtonStates() {
            if (!prevEpisodeBtn || !nextEpisodeBtn) return;

            // Disable PREV if it's the first episode or index is invalid
            if (currentEpisodeIndex <= 0) {
                prevEpisodeBtn.disabled = true;
            } else {
                prevEpisodeBtn.disabled = false;
            }

            // Disable NEXT if it's the last episode or index is invalid
            if (currentEpisodeIndex < 0 || currentEpisodeIndex >= currentEpisodes.length - 1) {
                nextEpisodeBtn.disabled = true;
            } else {
                nextEpisodeBtn.disabled = false;
            }
        }

        // (MODIFIED) Function to report an episode (Creates a report, does not update episode)
        async function markEpisodeAsBroken() {
            // (FIX) Add Guard Clause for Auth State
            if (!userId) {
                console.error("Cannot report: User is not authenticated yet.");
                if (brokenAlertDiv) {
                    brokenAlertDiv.classList.remove('hidden');
                    brokenAlertDiv.innerHTML = `<i class="ri-error-warning-line mr-2"></i> ไม่สามารถแจ้งได้: กรุณารอสักครู่และลองใหม่.`;
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
                return; // Stop execution
            }

            if (currentEpisodeIndex < 0 || !currentEpisodes[currentEpisodeIndex]) {
                console.warn("No current episode selected to report.");
                return;
            }
            
            const episode = currentEpisodes[currentEpisodeIndex];
            const episodeId = episode.id;

            // (NEW) Disable button immediately to prevent double click
            reportBrokenBtn.disabled = true;
            reportBrokenBtn.innerHTML = '<i class="ri-loader-4-line animate-spin mr-1"></i> กำลังแจ้ง...';

            console.log(`User ${userId} reporting episode ${episodeId} (${episode.title}) as broken...`);
            
            // *** (FIX 6) ลบการตรวจสอบซ้ำซ้อนออก และพยายาม addDoc ทันทีเพื่อให้ Rules ผ่าน
            try {
                // 1. กำหนด Reports Collection (Public Path)
                const reportsRef = collection(db, `artifacts/${appId}/public/data/reports`);
                
                // 2. ตรวจสอบรายงานที่มีอยู่ก่อน (ใช้ Query)
                const q = query(reportsRef, where("episodeId", "==", episodeId));
                const existingReportSnap = await getDocs(q);

                if (!existingReportSnap.empty) {
                    console.warn(`Report for episode ${episodeId} already exists.`);
                    
                    // มีรายงานอยู่แล้ว (ไม่จำเป็นต้องสร้างใหม่)
                    reportBrokenBtn.innerHTML = '<i class="ri-check-line mr-1"></i> แจ้งแล้ว';
                    reportBrokenBtn.classList.add('opacity-50', 'cursor-not-allowed', 'bg-red-600');
                    reportBrokenBtn.classList.remove('hover:bg-red-600');
                    
                    brokenAlertDiv.classList.remove('hidden');
                    brokenAlertDiv.innerHTML = `<i class="ri-information-line mr-2"></i> ปัญหาวิดีโอนี้ถูกแจ้งไปแล้ว กำลังรอการแก้ไข.`;
                    if (episode.status === 'broken') {
                        brokenAlertDiv.innerHTML = `<i class="ri-error-warning-line mr-2"></i> วิดีโอนี้ถูกยืนยันว่ามีปัญหา กำลังรอการแก้ไข.`;
                    }
                    return; 
                }

                // 3. ถ้าไม่มีรายงาน ให้สร้างรายงานใหม่ (ใช้ ADD DOC ซึ่ง Rules อนุญาตให้ create)
                const reportData = {
                    episodeId: episodeId,
                    showId: currentShow.id,
                    reportedBy: 'user', 
                    userId: userId, 
                    createdAt: serverTimestamp()
                };
                
                // Rules ตรวจสอบว่ามีฟิลด์เหล่านี้ครบถ้วนและ request.method == 'create'
                // หาก Rules ยังคงล้มเหลวที่บรรทัดนี้ แสดงว่าเงื่อนไขใน Rules ผิดพลาดแน่นอน
                await addDoc(reportsRef, reportData);

                // 4. Update UI to "Reported"
                reportBrokenBtn.innerHTML = '<i class="ri-check-line mr-1"></i> แจ้งแล้ว';
                reportBrokenBtn.classList.add('opacity-50', 'cursor-not-allowed', 'bg-red-600');
                reportBrokenBtn.classList.remove('hover:bg-red-600');
                
                if (brokenAlertDiv) {
                    brokenAlertDiv.classList.remove('hidden');
                    brokenAlertDiv.innerHTML = `<i class="ri-check-line mr-2"></i> ขอบคุณสำหรับการแจ้งปัญหา! เราจะเร่งแก้ไขโดยเร็วที่สุด.`;
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
                
                return;

            } catch (error) {
                // (MODIFIED) แสดงข้อผิดพลาดที่ชัดเจนโดยไม่ต้อง Retry (เพราะปัญหาไม่ใช่เครือข่าย)
                console.error("Error creating report:", error);
                
                reportBrokenBtn.disabled = false; 
                reportBrokenBtn.innerHTML = 'แจ้ง (ล้มเหลว)';
                
                if (brokenAlertDiv) {
                    brokenAlertDiv.classList.remove('hidden');
                    let errorMessage = error.message || 'เกิดข้อผิดพลาดที่ไม่ระบุ';
                    
                    if (errorMessage.startsWith('FirebaseError: ')) {
                        errorMessage = errorMessage.substring('FirebaseError: '.length);
                    }
                    
                    brokenAlertDiv.innerHTML = `
                        <i class="ri-error-warning-line mr-2"></i> 
                        ไม่สามารถส่งรายงานได้: ${errorMessage}.
                    `;
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }
        }


        // (FIXED: MOVED UP) ฟังก์ชันสำหรับคำนวณความสูงของ Episode List ให้เท่ากับ Video Player
        function syncEpisodeListHeight() {
            // 1. หาความสูงของ Video Player Wrapper
            const videoWrapper = document.querySelector('.video-aspect-wrapper');
            const episodeListContent = document.getElementById('episode-list-container');
            
            if (!videoWrapper || !episodeListContent) return;

            // ตรวจสอบว่าอยู่บนหน้าจอขนาดใหญ่ (lg: ขึ้นไป) ก่อนดำเนินการ
            if (window.innerWidth < 1024) {
                 // On mobile, reset max-height (Tailwind classes will handle overflow)
                 episodeListContent.style.maxHeight = 'initial';
                 return;
            }

            // On Desktop:
            const videoHeight = videoWrapper.offsetHeight;
            
            // 2. คำนวณความสูงที่เหลือสำหรับเนื้อหารายการตอน (Episode List Content)
            // HeaderAndPaddingOffset = 65px (ค่าประมาณความสูงของ h3 + mb-4 + pb-2 + p-4 ของ section)
            const headerAndPaddingOffset = 65; 
            const listMaxHeight = videoHeight - headerAndPaddingOffset;

            // 3. กำหนด Max-Height ให้กับ Episode List Container (let Tailwind handle overflow)
            episodeListContent.style.maxHeight = `${Math.max(100, listMaxHeight)}px`; // ต่ำสุด 100px
        }

        /**
         * (MODIFIED) แสดงรายละเอียดอนิเมะ (v8)

            showDescEl.classList.add('line-clamp-2');

        // (FIXED: MOVED UP) ตรวจสอบปุ่ม "เพิ่มเติม" (v8 - Back to Basics, Correct Timing)
        function checkDescriptionOverflow() {
            try {
                const el = showDescEl;
                // (FIX) ต้องแน่ใจว่า Line Clamp ยังอยู่
                el.classList.add('line-clamp-2'); 

                // ตรวจสอบว่า el.scrollHeight (ความสูงจริง) มากกว่า el.clientHeight (ความสูงที่ถูกบีบ)
                // เพิ่ม 1px tolerance สำหรับความคลาดเคลื่อนของเบราว์เซอร์
                const isOverflowing = el.scrollHeight > (el.clientHeight + 1);

                console.log(`(Final Check) ClientHeight: ${el.clientHeight}px, ScrollHeight: ${el.scrollHeight}px, IsOverflowing: ${isOverflowing}`);

                if (isOverflowing) {
                    // ถ้าข้อความล้นจริง -> แสดงปุ่ม
                    expandDescBtn.classList.remove('hidden');
                    expandDescBtn.innerHTML = 'เพิ่มเติม <i class="ri-arrow-down-s-line align-middle"></i>'; // Ensure it shows "เพิ่มเติม"
                } else {
                    // ถ้าข้อความไม่ล้น (สั้น 1-2 บรรทัด)
                    // เอา line-clamp-2 ออก
                    el.classList.remove('line-clamp-2');
                    expandDescBtn.classList.add('hidden'); 
                }
            } catch (error) {
                console.error("Error calculating description lines:", error);
            }
        }
        
        // (NEW) Helper function to scroll the episode list to the active button
        function scrollToActiveButton() {
            const activeButton = episodeListContainer.querySelector('.ep-button.active');
            
            if (activeButton && episodeListContainer) {
                // On mobile, the container scrolls horizontally
                if (window.innerWidth < 1024) { // Mobile/Tablet (lg breakpoint)
                    // We need to be in 'block' or 'inline-block' to measure offsetLeft
                    const containerWidth = episodeListContainer.clientWidth;
                    const buttonLeft = activeButton.offsetLeft;
                    const buttonWidth = activeButton.offsetWidth;
                    
                    episodeListContainer.scrollTo({
                        left: buttonLeft - (containerWidth / 2) + (buttonWidth / 2),
                        behavior: 'smooth'
                    });

                } else { // Desktop (lg:)
                    // On desktop, the container scrolls vertically
                    const containerHeight = episodeListContainer.clientHeight;
                    const buttonTop = activeButton.offsetTop; // offsetTop is relative to the container (since it's 'relative')
                    const buttonHeight = activeButton.offsetHeight;
                    
                    episodeListContainer.scrollTo({
                        top: buttonTop - (containerHeight / 2) + (buttonHeight / 2),
                        behavior: 'smooth'
                    });
                }
            }
        }
        
        /**
         * (MODIFIED) ฟังก์ชันเล่นวิดีโอ 
         * ฟังก์ชันนี้เป็นผู้รับผิดชอบหลักในการอัปเดต H1 Title
         */
        async function playEpisode(episode) {
            console.log(`Playing: ${episode.title}`, episode.embedCode);
            
            playerEmbedDiv.innerHTML = ''; 
            
            // ใช้ฟังก์ชัน embedVideo ที่สร้างไว้
            embedVideo(episode.embedCode);
            
            // อัปเดตชื่อเรื่องหลัก (นี่คือฟังก์ชันเดียวที่ทำหน้าที่นี้)
            if (currentShow) {
                showTitleEl.textContent = `${currentShow.title} - ${episode.title}`;
            }
            
            // อัปเดตปุ่มที่ active
            // (REMOVED) let activeButton = null;
            document.querySelectorAll('.ep-button').forEach(btn => {
                if (btn.dataset.episodeId === episode.id) {
                    btn.classList.add('active');
                    // (REMOVED) activeButton = btn;
                } else {
                    btn.classList.remove('active');
                }
            });
            
            // (MODIFIED) Auto-scroll logic moved to its own function
            // We call it with a timeout(0) to allow the DOM to render first,
            // which ensures offsetTop and clientHeight are correct, especially on page load.
            setTimeout(scrollToActiveButton, 0);
            
            // (NEW) เรียกใช้ฟังก์ชันบันทึกประวัติ
            if (currentShow && userId) { // (FIX) ตรวจสอบ userId ก่อนเรียก
                 saveToHistory(episode);
            }
            
            // (NEW) Update current index and nav button states
            currentEpisodeIndex = currentEpisodes.findIndex(ep => ep.id === episode.id);
            console.log("Current episode index:", currentEpisodeIndex);
            updateNavButtonStates();
            
            // (MODIFIED) อัปเดตสถานะปุ่ม "แจ้งเสีย" (ต้องเป็น async)
            if (reportBrokenBtn && brokenAlertDiv) {
                // 1. ตรวจสอบสถานะ 'broken' ที่ยืนยันโดย Admin/Script
                if (episode.status === 'broken') {
                    reportBrokenBtn.disabled = true;
                    reportBrokenBtn.innerHTML = '<i class="ri-check-line mr-1"></i> แจ้งแล้ว (เสีย)';
                    reportBrokenBtn.classList.add('opacity-50', 'cursor-not-allowed', 'bg-red-600');
                    reportBrokenBtn.classList.remove('hover:bg-red-600');
                    
                    // แสดง Alert
                    brokenAlertDiv.classList.remove('hidden');
                    brokenAlertDiv.innerHTML = `<i class="ri-error-warning-line mr-2"></i> วิดีโอสำหรับตอนนี้มีปัญหา (เสีย) กำลังรอการแก้ไขโดยผู้ดูแลระบบ.`;
                } else {
                    // 2. ถ้าสถานะไม่ 'broken', ให้ตรวจสอบว่ามี 'report' ที่ผู้ใช้แจ้งค้างไว้หรือไม่
                    
                    // (FIX 3) ใช้ Public Path สำหรับ Reports
                    const reportsRef = collection(db, `artifacts/${appId}/public/data/reports`);
                    
                    // (FIX 5) ใช้ Query/Where เหมือนเดิม เพราะ Rules อนุญาตให้อ่านได้
                    const q = query(reportsRef, where("episodeId", "==", episode.id));
                    const existingReportSnap = await getDocs(q);

                    if (!existingReportSnap.empty) {
                        // มีคนแจ้งแล้ว
                        reportBrokenBtn.disabled = true;
                        reportBrokenBtn.innerHTML = '<i class="ri-check-line mr-1"></i> แจ้งแล้ว';
                        reportBrokenBtn.classList.add('opacity-50', 'cursor-not-allowed', 'bg-red-600');
                        reportBrokenBtn.classList.remove('hover:bg-red-600');
                        brokenAlertDiv.classList.add('hidden'); // ซ่อน Alert (เพราะยังไม่ยืนยันว่าเสีย)
                    } else {
                        // ยังไม่มีใครแจ้ง และยังไม่เสีย (สถานะปกติ)
                        reportBrokenBtn.disabled = false;
                        reportBrokenBtn.innerHTML = '<i class="ri-error-warning-line mr-1"></i> แจ้ง (เสีย)';
                        reportBrokenBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-red-600');
                        reportBrokenBtn.classList.add('hover:bg-red-600');
                        brokenAlertDiv.classList.add('hidden'); // ซ่อน Alert
                    }
                }
            }
            
            // (NEW) อัปเดต URL ในแถบที่อยู่ (Address Bar) เพื่อให้การรีเฟรชทำงานถูกต้อง
            try {
                const newUrl = new URL(window.location.href);
                newUrl.searchParams.set('ep_id', episode.id); 
                
                // อัปเดต URL โดยไม่รีโหลดหน้า
                // เราใช้ replaceState เพื่อให้ปุ่ม Back ยังคงทำงานเพื่อกลับไปหน้า index.html
                window.history.replaceState({ episodeId: episode.id }, '', newUrl.href);
                console.log(`URL updated to reflect ep_id: ${episode.id}`);

            } catch (error) {
                console.warn("Could not update browser URL:", error);
            }
            
            // (NEW) Scroll to top on episode change (for mobile usability)
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        /**
         * (MODIFIED) สร้าง Card สำหรับ Related Shows ในรูปแบบ Grid (คล้าย index.html)
         * (MODIFIED) เพิ่มพารามิเตอร์ history เพื่อใช้ประวัติการดูค้างไว้
         */
        function createRelatedCard(show, history = null) {
            const title = show.title || "N/A";
            const isDub = (show.tags || []).includes('อนิเมะพากย์ไทย');
            const dubBadge = isDub ? `<div class="dub-badge">พากย์ไทย</div>` : '';
            
            // (NEW) ป้ายสถานะจบแล้วสำหรับ Related Card (มุมล่างซ้าย)
            // ใช้ฟิลด์ isCompleted ที่ถูกอัปเดตจาก admin.html
            const isCompleted = show.isCompleted === true;
            const completedBadge = isCompleted ? `
                <div class="status-badge-completed-related">จบแล้ว</div>
            ` : '';
            
            // (MODIFIED) ป้ายบอกตอนสูงสุด (มุมล่างขวา)
            let episodeBadge = '';
            // ใช้ฟิลด์ latestEpisodeNumber ที่ถูกอัปเดตจาก admin.html
            const latestEpisode = show.latestEpisodeNumber || 0;
            
            if (latestEpisode > 0) {
                episodeBadge = `
                    <div class="status-badge-episode-related">ตอนที่ ${latestEpisode}</div>
                `;
            }

            
            // (NEW LOGIC) ตรวจสอบประวัติการดูค้าง
            const watchedEpisodeId = history ? history.lastWatchedEpisodeId : null;
            let targetUrl = `player.html?id=${show.id}`;
            
            if (watchedEpisodeId) {
                // *** FIX: ถ้ามีประวัติดูค้างไว้ ให้อัปเดต URL ด้วย ep_id เพื่อเริ่มเล่นตอนที่ดูค้างไว้ ***
                targetUrl = `player.html?id=${show.id}&ep_id=${watchedEpisodeId}`;
            }

            
            // ** ใช้โครงสร้าง Card Grid แบบเดียวกับใน index.html แต่เพิ่มพื้นหลังเทาเข้ม **
            return `
                <!-- (MODIFIED) ใช้ targetUrl ที่ถูกปรับแล้ว -->
                <a href="${targetUrl}" class="block group bg-gray-700/80 rounded-lg overflow-hidden shadow-lg hover:shadow-xl transition-shadow duration-300">
                    <!-- 1. ส่วนภาพ (Image Aspect Ratio Container) -->
                    <!-- *** REMOVED rounded-lg from inner div. Rounded is now on parent link. *** -->
                    <div class="aspect-[2/3] overflow-hidden relative">
                        ${dubBadge}
                        ${episodeBadge} <!-- ป้ายตอนสูงสุด (มุมล่างขวา) -->
                        <img src="${show.thumbnailUrl || 'https://placehold.co/400x600/333/fff?text=No+Img'}" 
                             alt="${title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                        ${completedBadge} <!-- ป้ายจบแล้ว (มุมล่างซ้าย) -->
                    </div>
                    <!-- 2. ส่วนชื่อเรื่อง (Title - อยู่ใต้ภาพ) -->
                    <!-- *** MODIFIED: เปลี่ยน min-h-[3.5rem] เป็น h-14 เพื่อบังคับความสูง 2 บรรทัดเหมือน index.html *** -->
                    <div class="text-white h-14 p-3 pt-2">
                        <h4 class="font-bold related-card-title text-base">${title}</h4> 
                    </div>
                </a>
            `;
        }
        
        // (FIXED: MOVED UP) แสดงรายการ "อนิเมะที่คุณอาจจะชอบ" ในรูปแบบ Grid Card
        async function renderRelatedList(tags) {
            relatedListContainer.innerHTML = `<p class="text-gray-400">กำลังโหลดเรื่องแนะนำ...</p>`;
            
            try {
                let relatedShows = [];
                // (MODIFIED) 15 items (3 rows * 5 columns)
                const maxDisplay = 15; 

                if (tags && tags.length > 0) {
                    // 1. ถ้ามี Tags ให้ค้นหาอนิเมะที่มี tag ตรงกัน (ดึงทั้งหมด)
                    // Note: array-contains-any requires an index in real Firestore, but for a simple demo and small dataset, fetching all might be acceptable.
                    // For performance, we limit to 30 and shuffle/slice.
                    const allShowsSnapshot = await getDocs(query(getCollectionRef("shows"), limit(30)));
                    
                    allShowsSnapshot.forEach((doc) => {
                        const show = { id: doc.id, ...doc.data() };
                        // Check if show has any matching tag AND is not the current show
                        const hasMatchingTag = tags.some(tag => (show.tags || []).includes(tag));
                        if (currentShow && doc.id !== currentShow.id && hasMatchingTag) { 
                            relatedShows.push(show);
                        }
                    });
                } else {
                    // 2. ถ้าไม่มี Tags (หน้า Error) ให้ดึงเรื่องแนะนำทั่วไป (เรียงตาม ViewCount)
                    // (MODIFIED) จำกัดเป็น maxDisplay (15)
                    const relatedQuery = query(getCollectionRef("shows"), orderBy("viewCount", "desc"), limit(maxDisplay));
                    const querySnapshot = await getDocs(relatedQuery);
                    
                    querySnapshot.forEach((doc) => {
                        relatedShows.push({ id: doc.id, ...doc.data() });
                    });
                }

                // สุ่มและจำกัด 15 รายการ (3 แถว x 5 คอลัมน์)
                // (MODIFIED) Always use maxDisplay (15) for slicing
                relatedShows = relatedShows.sort(() => 0.5 - Math.random()).slice(0, maxDisplay);
                
                if(relatedShows.length === 0) {
                    // (MODIFIED) ข้อความแสดงผลเมื่อไม่พบ
                    relatedListContainer.innerHTML = `<p class="text-gray-400">ไม่พบอนิเมะที่เกี่ยวข้อง</p>`;
                    return;
                }
                
                // (MODIFIED) ตั้งค่า Container ให้เป็น Grid 2-5 คอลัมน์ (Responsive)
                // grid-cols-2 (mobile), md:grid-cols-3 (tablet), lg:grid-cols-5 (desktop)

        // (FIXED: MOVED UP) แสดงรายการ 10 อันดับยอดนิยม
        async function renderTop10List() {
            if (!top10ListContainer) return;
            top10ListContainer.innerHTML = '';
            
            try {
                // Query: เรียงตาม viewCount จากมากไปน้อย และจำกัด 10 รายการ (ใช้ logic เดียวกับ index.html)
                const top10Query = query(
                    getCollectionRef("shows"), 
                    orderBy("viewCount", "desc"), 
                    limit(10)
                );
                const querySnapshot = await getDocs(top10Query);
                
                let rank = 1;
                querySnapshot.forEach((doc) => {
                    const show = { id: doc.id, ...doc.data() };
                    
                    // (MODIFIED FIX) 1. Find history item for this Top 10 show
                    const historyItem = historyItems.find(h => h.showId === show.id);

                    // (MODIFIED FIX) 2. Pass the history item to createTop10Card
                    top10ListContainer.innerHTML += createTop10Card(show, rank, historyItem);
                    rank++;
                });

                if (querySnapshot.size === 0) {
                    top10ListContainer.innerHTML = `<p class="text-gray-400 p-4">ไม่พบข้อมูล 10 อันดับยอดนิยม</p>`;
                }
                
                // (MODIFIED) ลบ max-h-96 และ overflow-y-auto เพื่อให้แสดงครบ 10 รายการ
                top10ListContainer.classList.add('space-y-3');
                top10ListContainer.classList.remove('max-h-96', 'overflow-y-auto', 'pr-2'); 
                
            } catch (error) {
                console.error("Error fetching top 10 shows:", error);
                top10ListContainer.innerHTML = `<p class="text-red-400">เกิดข้อผิดพลาดในการโหลดอันดับ</p>`;
            }
        }

        /**
         * สร้าง Card สำหรับ Top 10 ในรูปแบบใหม่: มีป้ายอันดับตัวเลขใหญ่ ไม่มีดาว/คะแนน
         * @param {object} show - ข้อมูลอนิเมะ
         * @param {number} rank - อันดับ
         * @param {object | null} history - ข้อมูลประวัติการดูค้างของอนิเมะนี้ (NEW PARAMETER)
         */
        function createTop10Card(show, rank, history = null) {
            // (MODIFIED) ใช้ CSS Class สำหรับสีอันดับ
            let rankClass = '';
            if (rank === 1) rankClass = 'rank-1';
            else if (rank === 2) rankClass = 'rank-2';
            else if (rank === 3) rankClass = 'rank-3';

            const title = show.title || "N/A";
            const isDub = (show.tags || []).includes('อนิเมะพากย์ไทย');
            
            // Format ชื่อเรื่อง: ตัด [พากย์ไทย] ออกจากชื่อหลัก
            let displayTitle = title;
            let dubBadge = '';
            
            // (NEW) ป้ายสถานะจบแล้วสำหรับ Top 10 (ถ้ามี)
            // ใช้ฟิลด์ isCompleted ที่ถูกอัปเดตจาก admin.html
            const isCompleted = show.isCompleted === true;
            const completedTag = isCompleted ? ' <span class="text-sm text-green-400 font-medium">(จบแล้ว)</span>' : '';

            if (isDub) {
                 // ใช้ RegEx เพื่อลบ "(พากย์ไทย)" ที่อาจมีวงเล็บ หรือไม่มีวงเล็บก็ได้
                 displayTitle = displayTitle.replace(/\s*\(?พากย์ไทย\)?\s*$/, '').trim(); 
                 // (MODIFIED) เปลี่ยนเป็นแค่ Tag Text เล็กๆ แทน Rating
                 dubBadge = ' <span class="text-sm text-red-400 font-medium">(พากย์ไทย)</span>';
            }
            
            // (NEW FIX) Logic เพื่อสร้าง URL ที่มี ep_id ถ้ามีประวัติ
            const watchedEpisodeId = history ? history.lastWatchedEpisodeId : null;
            let targetUrl = `player.html?id=${show.id}`;
            
            if (watchedEpisodeId) {
                targetUrl = `player.html?id=${show.id}&ep_id=${watchedEpisodeId}`;
            }

            
            // ** ปรับโครงสร้าง HTML เพื่อใส่ป้ายอันดับและลบส่วน Rating ออกไป **
            return `
                <!-- (MODIFIED FIX) ใช้ targetUrl ที่มี ep_id -->
                <a href="${targetUrl}" class="top10-item hover:shadow-lg bg-gray-700"> 
                    <!-- 1. ป้ายอันดับตัวเลขใหญ่ --><span class="rank-badge-lg ${rankClass}">${rank}</span>
                    
                    <!-- 2. Thumbnail/Cover Image --><img src="${show.thumbnailUrl || 'https://placehold.co/60x80/333/fff?text=Img'}" 
                         alt="${title}" class="rounded-md top10-thumbnail shadow-md">
                    
                    <!-- 3. Content (Title) --><div class="top10-content flex-grow">
                        <!-- Title (Line Clamp 2) + Dub Badge + Completed Tag --><h4 class="font-bold text-white line-clamp-2 text-base leading-snug">${displayTitle}${dubBadge}${completedTag}</h4>
                        
                        <!-- (REMOVED) ลบส่วน Rating ออกไป -->
                    </div>
                </a>
            `;
        }
        
        // (NEW) ฟังก์ชันสำหรับโหลดเนื้อหาที่ไม่ขึ้นกับ Show ID (เช่น Top 10)
        async function loadGlobalContent() {
            console.log("Loading global content (Top 10)...");
            
            await renderTop10List();
            
            syncEpisodeListHeight(); 
        }

        // (NEW FUNCTION) Setup Listeners for Tags (Must be done to render Nav bar)
        async function setupListeners() {
            try {
                const tagQuery = query(getCollectionRef("tags"), orderBy("name"));
                onSnapshot(tagQuery, (snapshot) => {
                     allTags = []; 
                     snapshot.forEach((doc) => {

        // (NEW FUNCTION) Render Navigation Bar Dynamically
        function renderDynamicNav(activePageId = 'home') {
            if (!desktopNavLinks || !mobileNavLinks) return;
            
            // 1. Reset/Clear existing links (except "Home" and "Admin")
            desktopNavLinks.innerHTML = '';
            mobileNavLinks.innerHTML = '';
            
            // 2. Add "Home" link manually
            const homeLinkHtml = `<a href="index.html" data-page="home" class="nav-link px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-700">หน้าแรก</a>`;
            desktopNavLinks.innerHTML += homeLinkHtml;
            mobileNavLinks.innerHTML += `<a href="index.html" data-page="home" class="nav-link block px-3 py-2 rounded-md text-base font-medium text-gray-300 hover:text-white hover:bg-gray-700">หน้าแรก</a>`;
            
            // 3. Add Dynamic Tag Links
            const sortedTags = [...allTags].sort((a, b) => a.localeCompare(b, 'th')); // Sort locally

            sortedTags.forEach(tag => {
                const tagLinkHtml = `
                    <a href="grid.html?tag=${encodeURIComponent(tag)}" data-page="${tag}" class="nav-link px-3 py-2 rounded-md text-sm font-medium text-gray-300 hover:text-white hover:bg-gray-700">
                        ${tag}
                    </a>
                `;
                const tagLinkMobileHtml = `
                    <a href="grid.html?tag=${encodeURIComponent(tag)}" data-page="${tag}" class="nav-link block px-3 py-2 rounded-md text-base font-medium text-gray-300 hover:text-white hover:bg-gray-700">
                        ${tag}
                    </a>
                `;
                desktopNavLinks.innerHTML += tagLinkHtml;
                mobileNavLinks.innerHTML += tagLinkMobileHtml;
            });
            
            // 4. Add Admin Link (Mobile only)
             mobileNavLinks.innerHTML += `<a href="admin.html" class="block px-3 py-2 rounded-md text-base font-medium text-gray-300 hover:text-white hover:bg-gray-700"><i class="ri-settings-4-line mr-1"></i> ระบบจัดการหลังบ้าน</a>`;
            
            // 5. Set the active link(s) (Home is always active on this page since it's player.html)
            document.querySelectorAll(`.nav-link[data-page="${activePageId}"]`).forEach(link => {
                link.classList.add('active', 'text-green-500');
                link.classList.remove('text-gray-300', 'hover:text-white', 'hover:bg-gray-700');
            });
        }


        // โหลดเนื้อหา (อนิเมะและตอน)
        async function loadContent() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const showId = urlParams.get('id'); // ดึง ID จาก URL
                // (NEW) ดึง Episode ID ที่ต้องการเล่นจาก URL (มาจาก History Card)
                const epIdFromUrl = urlParams.get('ep_id'); 
                
                if (!showId) {
                    playerEmbedDiv.innerHTML = `<p class="text-red-500 p-4">ไม่พบ ID ของอนิเมะ</p>`;
                    
                    playerContentWrapper.classList.remove('hidden');
                    loadingPlayer.classList.add('hidden');
                    
                    // Clear show-specific UI
                    showTitleEl.textContent = "ไม่พบอนิเมะ";
                    // (MODIFIED) เรียก renderShowDetails เพื่อจัดการสถานะ Error
                    renderShowDetails({ title: "ไม่พบอนิเมะ", description: "โปรดกลับไปที่หน้าแรกเพื่อเลือกอนิเมะที่ถูกต้อง" });
                    episodeListContainer.innerHTML = `<p class="text-gray-400 p-4">ไม่สามารถโหลดรายการตอนได้</p>`;
                    
                    // หากไม่มี showId เราจะไม่สามารถหา Related List ได้
                    await renderRelatedList([]);

                    // (NEW) Disable nav buttons on error
                    currentEpisodeIndex = -1;
                    updateNavButtonStates();
                    return; // หยุดการโหลดข้อมูลเฉพาะอนิเมะ
                }

                // 1. ดึงข้อมูลอนิเมะ
                const showRef = doc(getCollectionRef("shows"), showId);
                const showSnap = await getDoc(showRef);

                if (!showSnap.exists()) {
                    playerEmbedDiv.innerHTML = `<p class="text-red-500 p-4">ไม่พบข้อมูลอนิเมะ</p>`;
                    // (MODIFIED) เรียก renderShowDetails เพื่อตั้งค่า Description เท่านั้น
                    renderShowDetails({ title: "ไม่พบข้อมูลอนิเมะ", description: "อนิเมะนี้อาจถูกลบไปแล้ว" });
                    
                    playerContentWrapper.classList.remove('hidden');
                    loadingPlayer.classList.add('hidden');
                    
                    // (NEW) Disable nav buttons on error
                    currentEpisodeIndex = -1;
                    updateNavButtonStates();
                    return;
                }
                
                // นับยอดวิว +1
                try {
                    await updateDoc(showRef, {
                        viewCount: increment(1)
                    });
                    console.log("View count incremented.");
                } catch (viewError) {
                    console.error("Error incrementing view count:", viewError);
                }

                currentShow = { id: showSnap.id, ...showSnap.data() };
                // (MODIFIED) ย้าย renderShowDetails ไปที่ 'finally'
                // renderShowDetails(currentShow);

                // 2. ดึงข้อมูลตอนทั้งหมดของอนิเมะนี้
                const episodesQuery = query(getCollectionRef("episodes"), where("showId", "==", showId));
                const episodesSnapshot = await getDocs(episodesQuery);
                
                currentEpisodes = [];
                episodesSnapshot.forEach((doc) => {
                    currentEpisodes.push({ id: doc.id, ...doc.data() });
                });
                
                // 3. เรียงลำดับตอน
                currentEpisodes.sort((a, b) => (a.episodeNumber || 0) - (b.episodeNumber || 0));
                
                console.log(`Loaded ${currentEpisodes.length} episodes for ${currentShow.title}`);
                
                // 4. Render UI เฉพาะอนิเมะนี้
                renderEpisodeList(currentEpisodes);
                
                await renderRelatedList(currentShow.tags || []); 

                // 5. เล่นตอนแรก (ถ้ามี)
                if (currentEpisodes.length > 0) {
                    let episodeToPlay = currentEpisodes[0]; // Default: ตอนที่ 1

                    // (NEW LOGIC - FIX) ตรวจสอบว่ามีตอนที่ระบุใน URL (มาจากหน้า History) หรือไม่
                    if (epIdFromUrl) {
                        const targetEpisode = currentEpisodes.find(ep => ep.id === epIdFromUrl);
                        if (targetEpisode) {
                             console.log(`Found ep_id=${epIdFromUrl}. Playing specific episode from History.`);
                             episodeToPlay = targetEpisode;
                        } else {
                             console.warn(`ep_id=${epIdFromUrl} found in URL but episode not in list. Defaulting to first episode.`);
                        }
                    }
                    
                    playEpisode(episodeToPlay); // Play the determined episode

                } else {
                    playerEmbedDiv.innerHTML = `<p class="text-gray-400 p-4">ยังไม่มีตอนสำหรับอนิเมะนี้</p>`;
                    // (NEW) Ensure buttons are disabled if no episodes
                    currentEpisodeIndex = -1; // Reset index
                    updateNavButtonStates(); 
                }
                
                
            } catch (error) {
                console.error("Error loading content:", error);
                playerEmbedDiv.innerHTML = `<p class="text-red-500 p-4">เกิดข้อผิดพลาดในการโหลด</p>`;
            } finally {
                
                loadingPlayer.classList.add('hidden');
                playerContentWrapper.classList.remove('hidden');
                
                // (MODIFIED) ย้าย renderShowDetails มาที่นี่
                if (currentShow) {
                    renderShowDetails(currentShow);
                }
                
                // checkDescriptionOverflow is now called inside renderShowDetails after a delay.
                
                syncEpisodeListHeight(); 
            }
        }

// (NEW FUNCTION) เชื่อมต่อ Listener ของปุ่มแจ้งเสียเมื่อ Auth พร้อม

        async function initializeFirebase() {
            try {
                const app = initializeApp(firebaseConfig); 
                db = getFirestore(app);
                auth = getAuth(app);
                setLogLevel('Debug'); 

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        userId = user.uid;
                        
                        console.log("User Authenticated (Anonymous):", userId);
                        
                        // (NEW) Load Tags first to render Nav
                        setupListeners();
                        
                        // (NEW) Load history items once (ก่อนโหลด related content)
                        await loadHistoryOnce(); 
                        
                        // (NEW) Load all shows for search function
                        await loadAllShowsForSearch();
                        
                        // *** (NEW FIX) เรียกตั้งค่าปุ่มแจ้งเสียตรงนี้ เมื่อ userId พร้อมแล้ว ***
                        setupReportButtonListener(); 
                        
                        await loadContent(); 
                        await loadGlobalContent();
                        
                        
                    } else {
                        await signIn(); // ถ้ายังไม่ล็อกอิน ให้ล็อกอินก่อน
                    }
                });
            } catch (error) {
                console.error("Firebase Initialization Error:", error);
            }
        }

        async function signIn() {
            try {
                 // NOTE: Using signInAnonymously if __initial_auth_token is not available (as per rules)
                 // Since this environment doesn't provide it easily, we use anonymous sign-in directly.
                const __initial_auth_token = ""; // Placeholder/mock
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token.length > 0) {
                     await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                     await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Sign In Error:", error);
            }
        }
        
        // (NEW) Helper function for Nav Buttons
        function handlePrevEpisode() {
            if (currentEpisodeIndex > 0) {
                const prevEpisode = currentEpisodes[currentEpisodeIndex - 1];
                playEpisode(prevEpisode);
            }
        }

        function handleNextEpisode() {
            if (currentEpisodeIndex < currentEpisodes.length - 1) {
                const nextEpisode = currentEpisodes[currentEpisodeIndex + 1];
                playEpisode(nextEpisode);
            }
        }

            const mobileSearchBar = document.getElementById('mobile-search-bar');
            const mobileCloseSearchBtn = document.getElementById('mobile-close-search');

            // (NEW) Mobile Menu Button Logic
            if (mobileMenuBtn && mobileMenu) {
                mobileMenuBtn.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                    toggleMobileSearch(false); // ปิดแถบค้นหา (ถ้าเปิดอยู่)
                    if (searchDropdown) searchDropdown.classList.add('hidden'); // (NEW) ซ่อน Desktop Dropdown
                });
            }
            
            // (NEW) Mobile Search Button Logic
            if (mobileSearchBtn && mobileSearchBar) {
                 mobileSearchBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    toggleMobileSearch(true); // เปิดแถบค้นหา
                    if (mobileMenu) mobileMenu.classList.add('hidden'); // ซ่อน Mobile Menu
                    if (searchDropdown) searchDropdown.classList.add('hidden'); // (NEW) ซ่อน Desktop Dropdown
                 });
            }
            
            // (NEW) Mobile Close Search Button Logic
            if (mobileCloseSearchBtn && mobileSearchBar) {
                 mobileCloseSearchBtn.addEventListener('click', () => {
                    toggleMobileSearch(false); // ปิดแถบค้นหา
                    if (mobileSearchDropdown) mobileSearchDropdown.classList.add('hidden'); // (NEW) ซ่อน Mobile Dropdown
                 });
            }
            
            // (NEW) Submit Search on Enter/Click (Desktop & Mobile)
            const searchButtonDesktop = document.getElementById('search-button-desktop');
            
            if (searchButtonDesktop && searchInput) {
                searchButtonDesktop.addEventListener('click', (e) => {
                    e.preventDefault();
                    // Pass only the query
                    handleSearchSubmit(searchInput.value);
                });
            }
            if (searchInput) {
                // (MODIFIED) Add Live Search Listener
                searchInput.addEventListener('input', handleSearchInput);
                searchInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault(); // Prevent default form submit (which might reload the page)
                        // Pass only the query
                        handleSearchSubmit(searchInput.value);
                    }
                });
            }
            if (mobileSearchInput) {
                // (MODIFIED) Add Live Search Listener
                mobileSearchInput.addEventListener('input', handleSearchInput);
                mobileSearchInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault(); // Prevent default form submit (which might reload the page)
                        // Pass only the query
                        handleSearchSubmit(mobileSearchInput.value);
                    }
                });
            }
            
            
            // (NEW) Logic to close menu when clicking on a navigation link inside the menu
            document.body.addEventListener('click', (e) => {
                // *** FIX: Changed variable name from 'document' to 'navLinkEl' to avoid global conflict. ***
                const navLinkEl = e.target.closest('.nav-link');
                if (navLinkEl) {
                    // Check if the clicked link is inside the mobile menu
                    if (mobileMenu && !mobileMenu.classList.contains('hidden')) {
                        mobileMenu.classList.add('hidden');
                    }
                }
                
                // (NEW) Close dropdowns if clicking outside
                if (searchDropdown && !e.target.closest('.search-container')) {
                     searchDropdown.classList.add('hidden');
                }
                if (mobileSearchDropdown && !e.target.closest('.search-container')) {
                     mobileSearchDropdown.classList.add('hidden');
                }
            });
            
            
            initializeFirebase(); 
            // (NEW) Attach resize listener
            window.addEventListener('resize', syncEpisodeListHeight);

            // (NEW) Event Listeners for Nav Buttons
            if (prevEpisodeBtn && nextEpisodeBtn) {
                 prevEpisodeBtn.addEventListener('click', handlePrevEpisode);
                 nextEpisodeBtn.addEventListener('click', handleNextEpisode);
            }
            
            // (NEW) Event Listener for Expand/Collapse Button
            if(expandDescBtn) { // (FIX) Add null check
                expandDescBtn.addEventListener('click', () => {
                    const isExpanded = expandDescBtn.dataset.expanded === 'true';
                    
                    if (isExpanded) {
                        // Collapse it
                        showDescEl.classList.add('line-clamp-2');
                        expandDescBtn.innerHTML = 'เพิ่มเติม <i class="ri-arrow-down-s-line align-middle"></i>';
                        expandDescBtn.dataset.expanded = 'false';
                    } else {
                        // Expand it
                        showDescEl.classList.remove('line-clamp-2');
                        expandDescBtn.innerHTML = 'ย่อ <i class="ri-arrow-up-s-line align-middle"></i>';
                        expandDescBtn.dataset.expanded = 'true';
                    }
                });
            }
        });

                        <div id="desktop-nav-links" class="ml-6 flex items-baseline space-x-4">

                <div class="hidden md:flex items-center space-x-4">
                    <div class="relative search-container">

                        <button id="search-button-desktop" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white">
                            <i class="ri-search-line"></i>
                        </button>
                        <div id="search-dropdown" class="search-dropdown hidden w-full rounded-b-lg">

                    <button id="mobile-menu-btn" class="text-gray-300 hover:text-white p-2">
                        <i class="ri-menu-line text-2xl"></i>
                    </button>
                </div>
            </div>
            
            <!-- Mobile Search Bar -->
            <div id="mobile-search-bar" class="md:hidden hidden p-2 absolute top-16 left-0 right-0 bg-gray-800 shadow-lg z-40">
                <div class="flex relative search-container">
                    <input id="mobile-search-input" type="text" placeholder="ค้นหา..." class="flex-1 bg-gray-700 text-white rounded-l-full py-2 px-4 focus:outline-none">
                    <button id="mobile-close-search" class="bg-gray-700 text-gray-400 rounded-r-full px-3">

                      <div id="mobile-search-dropdown" class="search-dropdown hidden w-full rounded-b-lg">

        <div id="mobile-menu" class="md:hidden hidden">

            <div id="mobile-nav-links" class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                 <a href="index.html" data-page="home" class="nav-link block px-3 py-2 rounded-md text-base font-medium text-gray-300 hover:text-white hover:bg-gray-700">หน้าแรก</a>

    <!-- (END MODIFIED HEADER) -->

    <!-- Main Player Content -->
    <!-- Loading State -->
    <div id="loading-player" class="flex items-center justify-center" style="min-height: 80vh;">
        <p class="text-2xl text-gray-400">กำลังโหลดเนื้อหา...</p>
    </div>
    
    <!-- Content (Hidden by default) -->
    <div id="player-content-wrapper" class="container mx-auto px-4 sm:px-6 lg:px-8 py-6 hidden">
        
        <!-- (NEW FIX 1) Broken Video Alert (Show/Hide in JS) -->
        <div id="broken-alert" class="hidden bg-red-800/80 border border-red-700 text-white p-3 rounded-lg mb-4 text-sm font-medium items-center">
            <i class="ri-error-warning-line mr-2"></i> วิดีโอสำหรับตอนนี้มีปัญหา (เสีย) กำลังรอการแก้ไขโดยผู้ดูแลระบบ.
        </div>

        <!-- FLEX CONTAINER หลัก: เปลี่ยนจาก lg:flex-row เป็น flex-wrap เพื่อควบคุม order ได้ง่ายขึ้นบน Desktop -->
        <!-- เราจะจัดเรียง 4 องค์ประกอบหลักใน container นี้ -->
        <div class="flex flex-wrap gap-6">
            
            <!-- 1. Player & Info (วิดีโอและรายละเอียด) -->
            <div class="w-full lg:w-[calc(66.666%-12px)] order-1 lg:order-1">
                <!-- Responsive Video Player Wrapper -->
                <div class="video-aspect-wrapper rounded-lg overflow-hidden"> <!-- (MODIFIED) Removed mb-4 -->
                    <div id="video-player-embed">
                        <!-- Initial Loading state for player -->
                        <div class="w-full h-full flex items-center justify-center bg-black">
                            <p class="text-gray-400">กำลังโหลดวิดีโอ...</p>
                        </div>
                    </div>
                </div>
                
                <!-- (NEW) Next/Previous Buttons -->
                <div id="video-nav-buttons" class="flex justify-between items-center mt-1"> <!-- (MODIFIED) Changed mt-2 to mt-1 and added items-center -->
                    <button id="prev-episode-btn" class="flex items-center bg-gray-700 hover:bg-green-600 text-white text-sm font-medium py-1 px-3 rounded-md transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="ri-arrow-left-s-line mr-1"></i>
                        ตอนก่อนหน้า
                    </button>
                    
                    <!-- (NEW) Report Broken Video Button -->
                    <button id="report-broken-btn" class="flex items-center bg-gray-700 hover:bg-red-600 text-white text-sm font-medium py-1 px-3 rounded-md transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="ri-error-warning-line mr-1"></i>
                        แจ้ง (เสีย)
                    </button>
                    
                    <button id="next-episode-btn" class="flex items-center bg-gray-700 hover:bg-green-600 text-white text-sm font-medium py-1 px-3 rounded-md transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                        ตอนถัดไป
                        <i class="ri-arrow-right-s-line ml-1"></i>
                    </button>
                </div>
                
                <!-- Show Info -->
                <div class="text-white mb-6 mt-4"> <!-- (MODIFIED) Added mt-4 for spacing -->
                    <h1 id="show-title" class="text-3xl font-bold mb-2">...</h1>
                    
                    <!-- (MODIFIED) Description Container -->
                    <div id="description-container">
                        <!-- (REVISED) เพิ่ม line-clamp-2 กลับไปเป็นค่าเริ่มต้น -->
                        <p id="show-description" class="text-gray-300 transition-all duration-200 line-clamp-2">...</p>
                        
                        <!-- (NEW) Expand/Collapse Button -->
                        <button id="expand-desc-btn" class="text-green-400 hover:text-green-300 font-medium text-sm mt-1 hidden flex items-center">
                            เพิ่มเติม <i class="ri-arrow-down-s-line align-middle"></i>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 2. รายการตอน (Episodes List) - ลำดับ 2 บนมือถือ -->
            <div class="w-full lg:w-[calc(33.333%-12px)] lg:max-w-md flex-shrink-0 order-2 lg:order-2">
                <section class="bg-gray-900/80 rounded-lg p-4"> <!-- (MODIFIED) เปลี่ยนเป็น bg-gray-900/80 -->
                    <h3 class="text-xl font-bold text-white mb-4 border-b border-gray-700 pb-2">รายการตอน</h3>
                    <div id="episode-list-container" class="flex flex-wrap gap-2">
                        <!-- Episode buttons injected by JS -->
                        <p class="text-gray-400">กำลังโหลดตอน...</p>
                    </div>
                </section>
            </div>
            
            <!-- 3. อนิเมะที่คุณอาจจะชอบ (Related Shows) - ลำดับ 3 บนมือถือ -->
            <div class="w-full lg:w-[calc(66.666%-12px)] order-3 lg:order-3">
                <section class="bg-gray-900/80 rounded-lg p-4 mb-6"> <!-- (MODIFIED) เปลี่ยนเป็น bg-gray-900/80 -->
                    <h3 class="text-xl font-bold text-white mb-4 border-b border-gray-700 pb-2">อนิเมะที่คุณอาจจะชอบ</h3>
                    <div id="related-list-container">
                        <!-- Related videos injected by JS -->
                        <p class="text-gray-400">กำลังโหลดเรื่องแนะนำ...</p>
                    </div>
                </section>
                
                <!-- (REMOVED) SECTION: ระบบคอมเมนต์ -->
            </div>
            
            <!-- 4. 10 อันดับอนิเมะยอดนิยม (Top 10 List) - ลำดับ 4 บนมือถือ -->
            <div class="w-full lg:w-[calc(33.333%-12px)] lg:max-w-md flex-shrink-0 order-4 lg:order-4">
                <section class="bg-gray-900/80 rounded-lg p-4"> <!-- (MODIFIED) เปลี่ยนเป็น bg-gray-900/80 -->
                    <h3 class="text-xl font-bold text-white mb-4 border-b border-gray-700 pb-2">10 อันดับอนิเมะยอดนิยม</h3>
                    <div id="top10-list-container" class="flex flex-col space-y-1">
                        <!-- Top 10 cards injected by JS -->
                        <p class="text-gray-400">กำลังโหลด 10 อันดับ...</p>
                    </div>
                </section>
            </div>
            
        </div>
    </div>
