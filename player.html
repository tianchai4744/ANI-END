<!DOCTYPE html>
<html lang="th" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeTV Clone - รับชม</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Remixicon Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet" />
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        /* 1. กล่องแม่ (Parent) - สร้างกรอบ 16:9 */
        .video-aspect-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            background-color: #000;
        }
        
        /* 2. กล่องลูก (Child) - ต้องเป็น Absolute เพื่อขยายเต็มกรอบแม่ */
        #video-player-embed {
            position: absolute; 
            top: 0;
            left: 0;
            width: 100%;
            height: 100%; 
            background-color: #000;
        }

        /* 3. กล่องหลาน (Grandchild - ตัว Iframe) - ขยายเต็มกล่องลูก */
        #video-player-embed iframe {
            width: 100%;
            height: 100%;
        }
        
        /* Removed Tab-related CSS */
        .ep-button.active { background-color: #00b87c; color: #fff; }
        
        /* Style สำหรับ Thumbnail ในส่วน Related/Grid View */
        .related-card-title {
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical;
        }
        
        /* Style สำหรับ Thumbnail ในส่วน Top 10 */
        .top10-thumbnail {
            width: 60px; /* กว้าง 60px */
            height: 80px; /* สูง 80px */
            aspect-ratio: 3/4; /* เพื่อให้คล้ายปก */
            object-fit: cover;
            flex-shrink: 0;
        }
        
        /* (NEW/MODIFIED) สไตล์สำหรับรายการ 10 อันดับทั้งหมด */
        .top10-item {
            display: flex;
            align-items: center;
            padding: 8px;
            background-color: #1f2937; /* gray-800 เป็นพื้นหลังรายการ */
            border-radius: 8px;
            transition: background-color 0.15s;
        }
        .top10-item:hover {
            background-color: #374151; /* gray-700 on hover */
        }
        
        /* (NEW) สไตล์สำหรับข้อความในรายการ 10 อันดับ */
        .top10-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-left: 12px;
            min-width: 0; /* เพื่อให้ชื่อเรื่องสามารถตัดได้ */
        }
        
        /* (NEW) สไตล์สำหรับป้ายอันดับ (Large Number) */
        .rank-badge-lg {
            width: 30px; /* ขนาดใหญ่ขึ้น */
            height: 80px; /* เท่าความสูงรูปปก */
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-right: 12px;
            
            font-size: 28px; /* ตัวเลขใหญ่มาก */
            font-weight: 900;
            
            /* (MODIFIED) เปลี่ยนเป็นสีขาวสำหรับอันดับทั่วไป */
            color: #f3f4f6; 
            
            /* (NEW) ใช้ Gradient หรือสีเฉพาะสำหรับ Top 3 */
            background-clip: text;
            -webkit-background-clip: text;
            /* สีเริ่มต้นสำหรับอันดับ > 3 */
            background-image: linear-gradient(180deg, #f3f4f6 0%, #a1a1aa 100%); /* White/Zinc Gradient */
        }
        
        /* (MODIFIED) สีพิเศษสำหรับ Top 3 - ใช้โทนสีสว่างขึ้น */
        .rank-badge-lg.rank-1 { 
            background-image: linear-gradient(180deg, #fcd34d 0%, #b45309 100%); /* Brighter Gold */
        } 
        .rank-badge-lg.rank-2 { 
            background-image: linear-gradient(180deg, #e5e7eb 0%, #9ca3af 100%); /* Silver */
        } 
        .rank-badge-lg.rank-3 { 
            background-image: linear-gradient(180deg, #f87171 0%, #dc2626 100%); /* Red/Bronze */
        } 
        
        /* (NEW) สไตล์สำหรับป้ายกำกับ "พากย์ไทย" ใน Related Card */
        .dub-badge {
            position: absolute;
            top: 4px; 
            left: 4px; 
            z-index: 10;
            background-color: #DC2626; /* Red-600 */
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
        }

    </style>
</head>
<body class="bg-gray-900 text-gray-100">

    <!-- Firebase SDK and Application Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, doc, getDoc, onSnapshot, collection, query, where, getDocs,
            setLogLevel,
            updateDoc, increment, orderBy, limit, addDoc, serverTimestamp // (NEW) เพิ่ม addDoc, serverTimestamp
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // (*** จำลอง Firebase Config เนื่องจาก Canvas ไม่ได้ให้ global vars มาในโหมดนี้ ***)
        const firebaseConfig = {
            apiKey: "AIzaSyDVXZUnw5oiTLqCG00GYdtPTwzOubCSe1o",
            authDomain: "ani-end-94710.firebaseapp.com",
            projectId: "ani-end-94710",
            storageBucket: "ani-end-94710.firebasestorage.app",
            messagingSenderId: "374608108501",
            appId: "1:374608108501:web:19a4767c41a020bfb03b5c",
            measurementId: "G-VZM1XTPMYL"
        };
        
        
        let db, auth, userId;
        let currentShow = null;
        let currentEpisodes = [];

        // UI Elements
        const playerEmbedDiv = document.getElementById('video-player-embed');
        const showTitleEl = document.getElementById('show-title');
        const showDescEl = document.getElementById('show-description');
        const episodeListContainer = document.getElementById('episode-list-container');
        const relatedListContainer = document.getElementById('related-list-container'); 
        const top10ListContainer = document.getElementById('top10-list-container'); 
        const loadingPlayer = document.getElementById('loading-player');
        const playerContentWrapper = document.getElementById('player-content-wrapper');

        // (NEW) Comment UI Elements (FIXED: ผูกตัวแปรกับ DOM Element)
        const commentForm = document.getElementById('comment-form');
        const commentInput = document.getElementById('comment-input');
        const commentsContainer = document.getElementById('comments-container');
        // REMOVED: const userNameInput = document.getElementById('comment-user-name');
        
        async function initializeFirebase() {
            try {
                const app = initializeApp(firebaseConfig); 
                db = getFirestore(app);
                auth = getAuth(app);
                setLogLevel('Debug'); 

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        userId = user.uid;
                        // (REMOVED) ไม่ต้องกำหนดค่า userNameInput แล้ว เพราะถูกลบไปแล้ว
                        
                        console.log("User Authenticated (Anonymous):", userId);
                        // (MODIFIED) เรียก loadContent เพื่อโหลดเนื้อหาที่เกี่ยวข้องกับ Show ID
                        // และเรียก loadGlobalContent เพื่อโหลดรายการที่ไม่ต้องใช้ Show ID
                        await loadContent(); 
                        await loadGlobalContent();
                    } else {
                        await signIn(); // ถ้ายังไม่ล็อกอิน ให้ล็อกอินก่อน
                    }
                });
            } catch (error) {
                console.error("Firebase Initialization Error:", error);
            }
        }

        async function signIn() {
            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Sign In Error:", error);
            }
        }

        // ฟังก์ชันช่วยสำหรับอ้างอิง Collection
        function getCollectionRef(collectionName) {
            const appId = firebaseConfig.projectId;
            return collection(db, `artifacts/${appId}/public/data/${collectionName}`);
        }
        
        // (NEW) ฟังก์ชันสำหรับโหลดเนื้อหาที่ไม่ขึ้นกับ Show ID (เช่น Top 10)
        async function loadGlobalContent() {
            console.log("Loading global content (Top 10)...");
            // NOTE: เราจะเรียก renderTop10List ที่นี่
            await renderTop10List();
            // (NEW) Call sync height after showing content
            syncEpisodeListHeight(); 
        }


        // โหลดเนื้อหา (ซีรีส์และตอน)
        async function loadContent() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const showId = urlParams.get('id'); // ดึง ID จาก URL
                
                if (!showId) {
                    playerEmbedDiv.innerHTML = `<p class="text-red-500 p-4">ไม่พบ ID ของซีรีส์</p>`;
                    // (NEW) ในกรณีที่ไม่พบ ID ให้แสดง UI หลักทันที แต่เนื้อหาวิดีโอว่างเปล่า
                    playerContentWrapper.classList.remove('hidden');
                    loadingPlayer.classList.add('hidden');
                    
                    // Clear show-specific UI
                    showTitleEl.textContent = "ไม่พบซีรีส์";
                    showDescEl.textContent = "โปรดกลับไปที่หน้าแรกเพื่อเลือกซีรีส์ที่ถูกต้อง";
                    episodeListContainer.innerHTML = `<p class="text-gray-400 p-4">ไม่สามารถโหลดรายการตอนได้</p>`;
                    
                    // (NEW) หากไม่มี showId เราจะไม่สามารถหา Related List ได้
                    // ให้โหลด Related List โดยไม่มี Tag กรอง (เพื่อแสดงเรื่องแนะนำทั่วไป)
                    await renderRelatedList([]);

                    return; // หยุดการโหลดข้อมูลเฉพาะซีรีส์
                }

                // 1. ดึงข้อมูลซีรีส์
                const showRef = doc(getCollectionRef("shows"), showId);
                const showSnap = await getDoc(showRef);

                if (!showSnap.exists()) {
                    playerEmbedDiv.innerHTML = `<p class="text-red-500 p-4">ไม่พบข้อมูลซีรีส์</p>`;
                    // (NEW) แสดง UI หลักเมื่อพบข้อผิดพลาด
                    playerContentWrapper.classList.remove('hidden');
                    loadingPlayer.classList.add('hidden');
                    return;
                }
                
                // นับยอดวิว +1
                try {
                    await updateDoc(showRef, {
                        viewCount: increment(1)
                    });
                    console.log("View count incremented.");
                } catch (viewError) {
                    console.error("Error incrementing view count:", viewError);
                }

                currentShow = { id: showSnap.id, ...showSnap.data() };
                renderShowDetails(currentShow);

                // 2. ดึงข้อมูลตอนทั้งหมดของซีรีส์นี้
                const episodesQuery = query(getCollectionRef("episodes"), where("showId", "==", showId));
                const episodesSnapshot = await getDocs(episodesQuery);
                
                currentEpisodes = [];
                episodesSnapshot.forEach((doc) => {
                    currentEpisodes.push({ id: doc.id, ...doc.data() });
                });
                
                // 3. เรียงลำดับตอน
                currentEpisodes.sort((a, b) => (a.episodeNumber || 0) - (b.episodeNumber || 0));
                
                console.log(`Loaded ${currentEpisodes.length} episodes for ${currentShow.title}`);
                
                // 4. Render UI เฉพาะซีรีส์นี้
                renderEpisodeList(currentEpisodes);
                // (NEW) เรียก renderRelatedList ที่นี่ เพราะต้องใช้ currentShow.tags
                await renderRelatedList(currentShow.tags || []); 

                // 5. เล่นตอนแรก (ถ้ามี)
                if (currentEpisodes.length > 0) {
                    playEpisode(currentEpisodes[0]);
                } else {
                    playerEmbedDiv.innerHTML = `<p class="text-gray-400 p-4">ยังไม่มีตอนสำหรับซีรีส์นี้</p>`;
                }
                
                // (NEW) ตั้ง Listener สำหรับคอมเมนต์หลังจากโหลด showId สำเร็จ
                setupCommentListener(showId); 
                
            } catch (error) {
                console.error("Error loading content:", error);
                playerEmbedDiv.innerHTML = `<p class="text-red-500 p-4">เกิดข้อผิดพลาดในการโหลด</p>`;
            } finally {
                // ซ่อน Loading และแสดงเนื้อหา (ถ้ายังไม่ได้ทำในเงื่อนไข showId)
                loadingPlayer.classList.add('hidden');
                playerContentWrapper.classList.remove('hidden');
                // (NEW) Call sync height after showing content
                syncEpisodeListHeight(); 
            }
        }

        // (NEW) ฟังก์ชันสำหรับจัดการการส่งคอมเมนต์
        // (FIX) เพิ่มการตรวจสอบว่า commentForm มีอยู่จริง
        if (commentForm) {
            commentForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // (FIX) ใช้ตัวแปร commentInput และ userNameInput ที่ถูกผูกกับ DOM แล้ว
                const commentText = commentInput.value.trim();
                // (FIXED) ไม่ใช้ input field แล้ว กำหนดชื่อผู้ใช้แบบ Anonymous โดยตรง
                const userName = `User-${userId.substring(0, 6)}`;
                
                if (!commentText || !currentShow || !userId) {
                    console.warn("Cannot post comment: Missing text, show ID, or user ID.");
                    return;
                }
                
                const newComment = {
                    showId: currentShow.id,
                    userId: userId,
                    userName: userName, // ใช้ชื่อ Anonymous ที่สร้างขึ้น
                    commentText: commentText,
                    createdAt: serverTimestamp()
                };

                try {
                    await addDoc(getCollectionRef("comments"), newComment);
                    commentInput.value = ''; // Clear input
                    // (REMOVED) ไม่ต้อง preserve username แล้ว
                } catch (error) {
                    console.error("Error posting comment:", error);
                    console.log("Error posting comment. Please try again.");
                }
            });
        }

        // (NEW) ฟังก์ชันสำหรับตั้ง Listener คอมเมนต์
        function setupCommentListener(showId) {
            // (FIX) เพิ่มการตรวจสอบว่า commentsContainer มีอยู่จริง
            if (!commentsContainer) return;
            
            const commentsQuery = query(
                getCollectionRef("comments"), 
                where("showId", "==", showId), 
                orderBy("createdAt", "desc"),
                limit(50) // จำกัดจำนวนคอมเมนต์ที่แสดง
            );
            
            onSnapshot(commentsQuery, (snapshot) => {
                commentsContainer.innerHTML = ''; // Clear old comments
                if (snapshot.empty) {
                    commentsContainer.innerHTML = `<p class="text-gray-400 p-4">ยังไม่มีคอมเมนต์ แสดงความคิดเห็นแรกของคุณสิ!</p>`;
                    return;
                }
                
                snapshot.forEach((doc) => {
                    const comment = doc.data();
                    commentsContainer.innerHTML += createCommentElement(comment);
                });
            }, (error) => {
                console.error("Error listening to comments:", error);
                commentsContainer.innerHTML = `<p class="text-red-500 p-4">ไม่สามารถโหลดคอมเมนต์ได้</p>`;
            });
        }
        
        // (NEW) สร้าง HTML Element สำหรับคอมเมนต์เดียว
        function createCommentElement(comment) {
            const date = comment.createdAt ? new Date(comment.createdAt.toMillis()) : new Date();
            const formattedTime = date.toLocaleString('th-TH', { 
                day: '2-digit', 
                month: 'short', 
                year: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            
            // ใช้ SVG icon สำหรับ user avatar
            const userAvatar = `
                <svg class="w-8 h-8 text-gray-400" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-6-3a2 2 0 11-4 0 2 2 0 014 0zm-2 4a5 5 0 00-4.546 2.916A5.98 5.98 0 0010 16a5.979 5.979 0 004.546-2.084A5 5 0 0010 11z" clip-rule="evenodd"></path>
                </svg>
            `;
            
            return `
                <div class="flex items-start space-x-3 p-4 border-b border-gray-700 last:border-b-0">
                    <div class="flex-shrink-0">
                        ${userAvatar}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-sm font-semibold text-white">${comment.userName}</span>
                            <span class="text-xs text-gray-500">${formattedTime}</span>
                        </div>
                        <p class="text-gray-300 break-words">${comment.commentText}</p>
                    </div>
                </div>
            `;
        }

        // (NEW) ฟังก์ชันสำหรับคำนวณความสูงของ Episode List ให้เท่ากับ Video Player
        function syncEpisodeListHeight() {
            // 1. หาความสูงของ Video Player Wrapper
            const videoWrapper = document.querySelector('.video-aspect-wrapper');
            const episodeListContent = document.getElementById('episode-list-container');
            
            if (!videoWrapper || !episodeListContent) return;

            // ตรวจสอบว่าอยู่บนหน้าจอขนาดใหญ่ (lg: ขึ้นไป) ก่อนดำเนินการ
            if (window.innerWidth < 1024) {
                 episodeListContent.style.maxHeight = 'initial';
                 episodeListContent.style.overflowY = 'initial';
                 episodeListContent.style.paddingRight = '0';
                 return;
            }

            const videoHeight = videoWrapper.offsetHeight;
            
            // 2. คำนวณความสูงที่เหลือสำหรับเนื้อหารายการตอน (Episode List Content)
            // HeaderAndPaddingOffset = 65px (ค่าประมาณความสูงของ h3 + mb-4 + pb-2 + p-4 ของ section)
            const headerAndPaddingOffset = 65; 
            const listMaxHeight = videoHeight - headerAndPaddingOffset;

            // 3. กำหนด Max-Height ให้กับ Episode List Container
            episodeListContent.style.maxHeight = `${Math.max(100, listMaxHeight)}px`; // ต่ำสุด 100px
            episodeListContent.style.overflowY = 'auto';
            episodeListContent.style.paddingRight = '8px'; // pr-2
        }

        // แสดงรายละเอียดซีรีส์
        function renderShowDetails(show) {
            showTitleEl.textContent = show.title;
            showDescEl.textContent = show.description || "ไม่มีคำอธิบาย";
        }

        // แสดงปุ่มรายการตอน
        function renderEpisodeList(episodes) {
            episodeListContainer.innerHTML = ''; 
            if (episodes.length === 0) {
                episodeListContainer.innerHTML = `<p class="text-gray-400 p-4">ไม่พบตอน</p>`;
                return;
            }
            
            // (MODIFIED) Remove fixed max-height and overflow classes here.
            episodeListContainer.className = 'flex flex-wrap gap-2'; 
            
            episodes.forEach((ep, index) => {
                const button = document.createElement('button');
                button.className = "ep-button w-12 h-12 flex-shrink-0 bg-gray-700 hover:bg-gray-600 rounded-md flex items-center justify-center font-medium transition-colors duration-200";
                button.textContent = ep.episodeNumber || (index + 1);
                button.dataset.episodeId = ep.id;
                
                button.addEventListener('click', () => {
                    playEpisode(ep);
                });
                
                episodeListContainer.appendChild(button);
            });
            
            // (NEW) Call sync height after rendering buttons
            syncEpisodeListHeight(); 
        }
        
        /**
         * (MODIFIED) แสดงรายการ "อนิเมะที่คุณอาจจะชอบ" ในรูปแบบ Grid Card
         */
        async function renderRelatedList(tags) {
            relatedListContainer.innerHTML = `<p class="text-gray-400">กำลังโหลดเรื่องแนะนำ...</p>`;
            
            try {
                let relatedQuery;
                let relatedShows = [];
                // (MODIFIED) 15 items (3 rows * 5 columns)
                const maxDisplay = 15; 

                if (tags && tags.length > 0) {
                    // 1. ถ้ามี Tags ให้ค้นหาซีรีส์ที่มี tag ตรงกัน (ดึงทั้งหมด)
                    relatedQuery = query(getCollectionRef("shows"), where("tags", "array-contains-any", tags));
                    const querySnapshot = await getDocs(relatedQuery);
                    
                    querySnapshot.forEach((doc) => {
                        // กรองเรื่องปัจจุบันออก
                        if (currentShow && doc.id !== currentShow.id) { 
                            relatedShows.push({ id: doc.id, ...doc.data() });
                        }
                    });
                } else {
                    // 2. ถ้าไม่มี Tags (หน้า Error) ให้ดึงเรื่องแนะนำทั่วไป (เรียงตาม ViewCount)
                    // (MODIFIED) จำกัดเป็น maxDisplay (15)
                    relatedQuery = query(getCollectionRef("shows"), orderBy("viewCount", "desc"), limit(maxDisplay));
                    const querySnapshot = await getDocs(relatedQuery);
                    
                    querySnapshot.forEach((doc) => {
                        relatedShows.push({ id: doc.id, ...doc.data() });
                    });
                }

                // สุ่มและจำกัด 15 รายการ (3 แถว x 5 คอลัมน์)
                // (MODIFIED) Always use maxDisplay (15) for slicing
                relatedShows = relatedShows.sort(() => 0.5 - Math.random()).slice(0, maxDisplay);
                
                if(relatedShows.length === 0) {
                    // (MODIFIED) ข้อความแสดงผลเมื่อไม่พบ
                    relatedListContainer.innerHTML = `<p class="text-gray-400">ไม่พบซีรีส์ที่เกี่ยวข้อง</p>`;
                    return;
                }
                
                // (MODIFIED) ตั้งค่า Container ให้เป็น Grid 2-5 คอลัมน์ (Responsive)
                // grid-cols-2 (mobile), md:grid-cols-3 (tablet), lg:grid-cols-5 (desktop)
                relatedListContainer.className = 'grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4';
                relatedListContainer.innerHTML = ''; // Clear loading text

                relatedShows.forEach(show => {
                    relatedListContainer.innerHTML += createRelatedCard(show);
                });

            } catch (error) {
                console.error("Error fetching related shows:", error);
                relatedListContainer.innerHTML = `<p class="text-red-400">เกิดข้อผิดพลาดในการโหลดเรื่องแนะนำ</p>`;
            }
        }
        
        /**
         * (NEW) สร้าง Card สำหรับ Related Shows ในรูปแบบ Grid (คล้าย index.html)
         */
        function createRelatedCard(show) {
            const title = show.title || "N/A";
            const isDub = (show.tags || []).includes('อนิเมะพากย์ไทย');
            
            // Format ชื่อเรื่อง
            let displayTitle = title;
            const dubBadge = isDub ? `<div class="dub-badge">พากย์ไทย</div>` : '';
            
            // ** ใช้โครงสร้าง Card Grid แบบเดียวกับใน index.html **
            return `
                <a href="player.html?id=${show.id}" class="block group">
                    <!-- 1. ส่วนภาพ (Image Aspect Ratio Container) -->
                    <div class="aspect-[2/3] rounded-lg overflow-hidden mb-2 relative">
                        ${dubBadge}
                        <img src="${show.thumbnailUrl || 'https://placehold.co/400x600/333/fff?text=No+Img'}" 
                             alt="${title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">
                    </div>
                    <!-- 2. ส่วนชื่อเรื่อง (Title - อยู่ใต้ภาพ) -->
                    <div class="text-white min-h-10">
                        <h4 class="font-bold related-card-title text-sm">${displayTitle}</h4> 
                    </div>
                </a>
            `;
        }

        // แสดงรายการ 10 อันดับยอดนิยม (ไม่มีการเปลี่ยนแปลงหลัก)
        async function renderTop10List() {
            top10ListContainer.innerHTML = '';
            
            try {
                // Query: เรียงตาม viewCount จากมากไปน้อย และจำกัด 10 รายการ (ใช้ logic เดียวกับ index.html)
                const top10Query = query(
                    getCollectionRef("shows"), 
                    orderBy("viewCount", "desc"), 
                    limit(10)
                );
                const querySnapshot = await getDocs(top10Query);
                
                let rank = 1;
                querySnapshot.forEach((doc) => {
                    const show = { id: doc.id, ...doc.data() };
                    // ใช้ createTop10Card ที่ปรับปรุงใหม่
                    top10ListContainer.innerHTML += createTop10Card(show, rank);
                    rank++;
                });

                if (querySnapshot.size === 0) {
                    top10ListContainer.innerHTML = `<p class="text-gray-400 p-4">ไม่พบข้อมูล 10 อันดับยอดนิยม</p>`;
                }
                
                // (MODIFIED) ลบ max-h-96 และ overflow-y-auto เพื่อให้แสดงครบ 10 รายการ
                top10ListContainer.classList.add('space-y-3');
                top10ListContainer.classList.remove('max-h-96', 'overflow-y-auto', 'pr-2'); 
                
            } catch (error) {
                console.error("Error fetching top 10 shows:", error);
                top10ListContainer.innerHTML = `<p class="text-red-400 p-4">เกิดข้อผิดพลาดในการโหลดอันดับ</p>`;
            }
        }

        /**
         * สร้าง Card สำหรับ Top 10 ในรูปแบบใหม่: มีป้ายอันดับตัวเลขใหญ่ ไม่มีดาว/คะแนน
         */
        function createTop10Card(show, rank) {
            // (MODIFIED) ใช้ CSS Class สำหรับสีอันดับ
            let rankClass = '';
            if (rank === 1) rankClass = 'rank-1';
            else if (rank === 2) rankClass = 'rank-2';
            else if (rank === 3) rankClass = 'rank-3';

            const title = show.title || "N/A";
            const isDub = (show.tags || []).includes('อนิเมะพากย์ไทย');
            
            // Format ชื่อเรื่อง: ตัด [พากย์ไทย] ออกจากชื่อหลัก
            let displayTitle = title;
            let dubBadge = '';
            if (isDub) {
                 displayTitle = displayTitle.replace(/\s*\(พากย์ไทย\)\s*$/, '').trim(); // ลบ (พากย์ไทย) ที่ท้ายชื่อ
                 // (MODIFIED) เปลี่ยนเป็นแค่ Tag Text เล็กๆ แทน Rating
                 dubBadge = ' <span class="text-sm text-red-400 font-medium">(พากย์ไทย)</span>';
            }
            
            // ** ปรับโครงสร้าง HTML เพื่อใส่ป้ายอันดับและลบส่วน Rating ออก **
            return `
                <a href="player.html?id=${show.id}" class="top10-item hover:shadow-lg">
                    <!-- 1. ป้ายอันดับตัวเลขใหญ่ -->
                    <span class="rank-badge-lg ${rankClass}">${rank}</span>
                    
                    <!-- 2. Thumbnail/Cover Image -->
                    <img src="${show.thumbnailUrl || 'https://placehold.co/60x80/333/fff?text=Img'}" 
                         alt="${title}" class="rounded-md top10-thumbnail shadow-md">
                    
                    <!-- 3. Content (Title) -->
                    <div class="top10-content flex-grow">
                        <!-- Title (Line Clamp 2) + Dub Badge -->
                        <h4 class="font-bold text-white line-clamp-2 text-base leading-snug">${displayTitle}${dubBadge}</h4>
                        
                        <!-- (REMOVED) ลบส่วน Rating ออกไป -->
                        
                    </div>
                </a>
            `;
        }


        // ฟังก์ชันเล่นวิดีโอ (ไม่มีการเปลี่ยนแปลง)
        function playEpisode(episode) {
            console.log(`Playing: ${episode.title}`, episode.embedCode);
            
            playerEmbedDiv.innerHTML = ''; 
            
            if (episode.embedCode && episode.embedCode.trim().startsWith('http')) {
                // กรณีเป็น URL (เช่น archive.org/embed/)
                let videoUrlStr = episode.embedCode;

                // พยายามเพิ่ม autoplay=1
                try {
                    const videoUrl = new URL(videoUrlStr);
                    videoUrl.searchParams.set('autoplay', '1');
                    videoUrlStr = videoUrl.href;
                } catch (e) {
                    console.warn("Could not parse URL to add autoplay, trying string append:", e);
                    if (videoUrlStr.includes('?')) {
                        videoUrlStr += '&autoplay=1';
                    } else {
                        videoUrlStr += '?autoplay=1';
                    }
                }

                const iframe = document.createElement('iframe');
                iframe.src = videoUrlStr; 
                iframe.setAttribute('frameborder', '0');
                iframe.setAttribute('allow', 'autoplay; fullscreen'); 
                iframe.setAttribute('webkitallowfullscreen', 'true');
                iframe.setAttribute('mozallowfullscreen', 'true');
                iframe.setAttribute('allowfullscreen', 'true');
                
                playerEmbedDiv.appendChild(iframe);

            } else if (episode.embedCode) {
                // กรณีเป็น <iframe> tag (HTML string)
                playerEmbedDiv.innerHTML = episode.embedCode;
            } else {
                playerEmbedDiv.innerHTML = `<p class="text-red-500 p-4">ไม่พบลิงก์วิดีโอสำหรับตอนนี้</p>`;
            }
            
            // อัปเดตชื่อเรื่องหลัก
            showTitleEl.textContent = `${currentShow.title} - ${episode.title}`;
            
            // อัปเดตปุ่มที่ active
            document.querySelectorAll('.ep-button').forEach(btn => {
                if (btn.dataset.episodeId === episode.id) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initializeFirebase(); 
            // (NEW) Attach resize listener
            window.addEventListener('resize', syncEpisodeListHeight);
            // Removed Tab logic as we are no longer using tabs.
        });

    </script>
